<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Molytica - CSV Veri Düzenleyici</title>
  <link rel="icon" href="{{ url_for('static', filename='assets/favicon.ico') }}" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f6f7f9;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-header: rgba(255, 255, 255, 0.88);
      --bg-input: #f1f3f5;
      --bg-table-alt: #fafbfc;
      --text-primary: #0a0a0a;
      --text-secondary: #4a4a4a;
      --text-muted: #7a7a7a;
      --border-color: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.18);
      --border-focus: rgba(0, 0, 0, 0.3);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.06);
      --btn-bg: #ffffff;
      --btn-text: #0a0a0a;
      --btn-hover: #0a0a0a;
      --btn-hover-text: #ffffff;
      --footer-bg: #0a0a0a;
      --footer-text: #d0d0d0;
      --clock-bg: #eef0f2;
      --clock-text: #3a3a3a;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --radius-xl: 100px;
      --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --font: 'Inter', -apple-system, system-ui, sans-serif;
      --editing-bg: #fffde7;
      --editing-border: #2196F3;
      --toast-bg: #0a0a0a;
      --toast-text: #ffffff;
    }

    [data-theme="dark"] {
      --bg-primary: #0d0d0d;
      --bg-secondary: #161616;
      --bg-card: #1a1a1a;
      --bg-header: rgba(20, 20, 20, 0.92);
      --bg-input: #282828;
      --bg-table-alt: #202020;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #707070;
      --border-color: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.14);
      --border-focus: rgba(255, 255, 255, 0.25);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.5);
      --btn-bg: #222222;
      --btn-text: #f0f0f0;
      --btn-hover: #f0f0f0;
      --btn-hover-text: #0a0a0a;
      --footer-bg: #0a0a0a;
      --footer-text: #888888;
      --clock-bg: #282828;
      --clock-text: #c0c0c0;
      --editing-bg: #2a2a1a;
      --editing-border: #64b5f6;
      --toast-bg: #f0f0f0;
      --toast-text: #0a0a0a;
    }

    body {
      background: var(--bg-primary);
      font-family: var(--font);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      background: var(--bg-header);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      height: 38px;
      cursor: pointer;
      transition: transform 0.3s ease;
      filter: brightness(0);
    }
    [data-theme="dark"] .logo {
      filter: brightness(0) invert(1);
    }
    .logo:hover {
      transform: scale(1.05) rotate(-1deg);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      transition: color var(--transition);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #clock {
      font-size: 0.85rem;
      font-weight: 450;
      color: var(--clock-text);
      background: var(--clock-bg);
      padding: 4px 14px;
      border-radius: var(--radius-xl);
      letter-spacing: 0.4px;
      font-variant-numeric: tabular-nums;
      transition: all var(--transition);
    }

    .theme-toggle {
      background: var(--clock-bg);
      border: none;
      border-radius: var(--radius-xl);
      padding: 6px 12px;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text-primary);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .theme-toggle:hover {
      transform: scale(0.95);
    }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--border-hover);
      border-radius: var(--radius-xl);
      padding: 5px 14px;
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .lang-btn:hover {
      background: var(--text-primary);
      color: var(--bg-primary);
      transform: scale(0.95);
    }
    .lang-btn.animate {
      transform: scale(0.92);
      transition: transform 0.15s ease;
    }

    main {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
      flex: 1;
      width: 100%;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      animation: fadeUp 0.7s ease forwards;
    }
    .page-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      transition: color var(--transition);
    }
    .page-header .file-info {
      font-size: 0.9rem;
      color: var(--text-muted);
      background: var(--bg-input);
      padding: 4px 16px;
      border-radius: var(--radius-xl);
      transition: all var(--transition);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
      animation: fadeUp 0.7s ease 0.1s forwards;
      opacity: 0;
    }

    .btn {
      padding: 10px 24px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: var(--font);
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-sm);
    }
    .btn:hover:not(:disabled) {
      background: var(--btn-hover);
      color: var(--btn-hover-text);
      border-color: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .btn:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-primary {
      background: var(--text-primary);
      color: var(--bg-primary);
      border-color: var(--text-primary);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--text-secondary);
      border-color: var(--text-secondary);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border-hover);
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
      border-color: #dc2626;
    }
    .btn-danger:hover:not(:disabled) {
      background: #b91c1c;
      border-color: #b91c1c;
    }
    [data-theme="dark"] .btn-danger {
      background: #ef4444;
      border-color: #ef4444;
    }
    [data-theme="dark"] .btn-danger:hover:not(:disabled) {
      background: #dc2626;
      border-color: #dc2626;
    }

    .table-section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
      animation: fadeUp 0.7s ease 0.2s forwards;
      opacity: 0;
      overflow-x: auto;
    }
    .table-section:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-md);
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 500px;
    }

    thead th {
      padding: 12px 16px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border-color);
      text-align: left;
      background: var(--bg-input);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 10;
      transition: all var(--transition);
    }

    tbody tr {
      transition: background var(--transition);
    }
    tbody tr:nth-child(even) {
      background: var(--bg-table-alt);
    }
    tbody tr:hover {
      background: var(--bg-input);
    }
    tbody tr.deleted {
      background: #fef2f2 !important;
      opacity: 0.5;
    }
    [data-theme="dark"] tbody tr.deleted {
      background: #3a1a1a !important;
    }

    tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
      transition: all var(--transition);
      min-height: 44px;
      vertical-align: middle;
    }

    tbody td[contenteditable="true"] {
      cursor: text;
      position: relative;
      outline: none;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }
    tbody td[contenteditable="true"]:hover {
      background: var(--bg-input);
    }
    tbody td[contenteditable="true"]:focus {
      background: var(--editing-bg);
      box-shadow: 0 0 0 2px var(--editing-border);
      border-radius: var(--radius-sm);
    }

    tbody td .action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }
    tbody td .action-btn:hover {
      color: var(--text-primary);
      background: var(--bg-input);
    }
    tbody td .action-btn.delete-btn:hover {
      color: #dc2626;
      background: rgba(220, 38, 38, 0.1);
    }

    .message {
      padding: 12px 20px;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }
    .message.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
    }
    .message.success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }
    .message.info {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e40af;
    }
    [data-theme="dark"] .message.error {
      background: #3a1a1a;
      border-color: #ef5350;
      color: #ef9a9a;
    }
    [data-theme="dark"] .message.success {
      background: #1a3a1a;
      border-color: #4caf50;
      color: #a5d6a7;
    }
    [data-theme="dark"] .message.info {
      background: #1a2a4a;
      border-color: #3b82f6;
      color: #93c5fd;
    }

    .message .icon {
      font-size: 1.2rem;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--toast-bg);
      color: var(--toast-text);
      padding: 14px 28px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 3000;
      animation: slideDown 0.4s ease;
      max-width: 400px;
    }
    .toast.success { border-left: 4px solid #22c55e; }
    .toast.error { border-left: 4px solid #ef4444; }
    .toast.info { border-left: 4px solid #3b82f6; }

    footer {
      background: var(--footer-bg);
      color: var(--footer-text);
      padding: 32px 24px 24px;
      margin-top: 40px;
      border-top: 1px solid var(--border-color);
      transition: background var(--transition), border-color var(--transition);
    }
    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }
    .footer-content .contact {
      font-size: 0.9rem;
      margin-bottom: 14px;
      opacity: 0.7;
      letter-spacing: 0.2px;
    }
    .footer-content .contact strong {
      opacity: 1;
      color: #fff;
      font-weight: 500;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin: 16px 0 18px;
    }
    .social-icons a {
      color: #888;
      font-size: 1.3rem;
      transition: all 0.3s ease;
      opacity: 0.5;
    }
    .social-icons a:hover {
      color: #fff;
      transform: translateY(-2px);
      opacity: 1;
    }
    .copyright {
      font-size: 0.8rem;
      opacity: 0.35;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state i {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
      opacity: 0.3;
    }
    .empty-state p {
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      header { padding: 12px 20px; }
      .logo { height: 30px; }
      header h1 { font-size: 1rem; }
      #clock { display: none; }
      .theme-toggle { padding: 4px 10px; font-size: 0.85rem; }
      .lang-btn { padding: 4px 10px; font-size: 0.65rem; }
      main { margin: 20px auto; padding: 0 16px; }
      .page-header h2 { font-size: 1.2rem; }
      .page-header .file-info { font-size: 0.8rem; }
      .toolbar { gap: 8px; }
      .btn { padding: 8px 16px; font-size: 0.8rem; }
      .table-section { padding: 16px; border-radius: var(--radius-md); }
      thead th, tbody td { padding: 8px 12px; font-size: 0.8rem; }
      footer { padding: 24px 16px; }
      .social-icons a { font-size: 1.1rem; gap: 20px; }
      .toast { bottom: 20px; right: 20px; left: 20px; max-width: none; }
    }

    @media (max-width: 480px) {
      header h1 { font-size: 0.85rem; }
      .lang-btn { font-size: 0.6rem; padding: 3px 8px; }
      .page-header { flex-direction: column; align-items: flex-start; }
      .btn { padding: 6px 14px; font-size: 0.75rem; }
      .table-section { padding: 12px; }
      thead th, tbody td { padding: 6px 10px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="Molytica" class="logo" id="logo">
      <h1 id="headerTitle">Edit</h1>
    </div>
    <div class="header-right">
      <div id="clock"></div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>
      <button class="lang-btn" id="langSwitch">TR</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h2 id="pageTitle">CSV Veri Düzenleyici</h2>
      <span class="file-info" id="filenameDisplay">Dosya yükleniyor...</span>
    </div>

    <div id="messageContainer"></div>

    <div class="toolbar">
      <button class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> <span>Sunucuya Kaydet</span></button>
      <button class="btn btn-outline" id="undoBtn" disabled><i class="fas fa-undo"></i> <span>Geri Al</span> <span class="badge" id="undoCount">0</span></button>
      <button class="btn btn-outline" id="redoBtn" disabled><i class="fas fa-redo"></i> <span>Yinele</span> <span class="badge" id="redoCount">0</span></button>
      <button class="btn btn-outline" id="addRowBtn"><i class="fas fa-plus"></i> <span>Yeni Satır</span></button>
      <button class="btn btn-danger" id="clearBtn" disabled><i class="fas fa-trash"></i> <span>Tümünü Temizle</span></button>
    </div>

    <section class="table-section">
      <div class="table-wrapper">
        <table id="dataTable">
          <thead><tr></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <div class="contact">
        <strong id="contactLabel">İletişim</strong>
        <span id="contactInfo">akkochief@gmail.com · @akkochief</span>
      </div>
      <div class="social-icons">
        <a href="https://x.com/akkochief" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="https://github.com/akkocchief" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/akkochief/" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <div class="copyright" id="copyright">© 2026 Molytica</div>
    </div>
  </footer>

  <script>
    (function() {
      'use strict';

      var currentLang = 'tr';
      var dark = localStorage.getItem('molytica-theme') === 'dark';

      var $ = function(id) { return document.getElementById(id); };

      var els = {
        logo: $('logo'),
        langSwitch: $('langSwitch'),
        themeToggle: $('themeToggle'),
        themeIcon: $('themeIcon'),
        clock: $('clock'),
        table: $('dataTable'),
        thead: document.querySelector('#dataTable thead tr'),
        tbody: document.querySelector('#dataTable tbody'),
        filenameDisplay: $('filenameDisplay'),
        saveBtn: $('saveBtn'),
        undoBtn: $('undoBtn'),
        redoBtn: $('redoBtn'),
        addRowBtn: $('addRowBtn'),
        clearBtn: $('clearBtn'),
        msgContainer: $('messageContainer'),
        undoCount: $('undoCount'),
        redoCount: $('redoCount'),
        headerTitle: $('headerTitle'),
        pageTitle: $('pageTitle'),
        contactLabel: $('contactLabel'),
        contactInfo: $('contactInfo'),
        copyright: $('copyright')
      };

      var data = [];
      var headers = [];
      var undoStack = [];
      var redoStack = [];
      var currentEditCell = null;
      var filename = '';
      var rowIdCounter = 0;

      var translations = {
        tr: {
          headerTitle: 'Düzenle',
          pageTitle: 'CSV Veri Düzenleyici',
          contact: 'İletişim',
          contactInfo: 'akkochief@gmail.com · @akkochief',
          copyright: '© 2026 Molytica',
          save: 'Sunucuya Kaydet',
          undo: 'Geri Al',
          redo: 'Yinele',
          addRow: 'Yeni Satır',
          clear: 'Tümünü Temizle',
          loading: 'Dosya yükleniyor...',
          error: 'Hata',
          success: 'Başarılı',
          deleteRow: 'Satırı sil',
          noData: 'Henüz veri yok. Yeni satır ekleyin veya farklı bir dosya yükleyin.',
          confirmClear: 'Tüm verileri silmek istediğinize emin misiniz?',
          saveSuccess: 'Veriler başarıyla kaydedildi!',
          saveError: 'Kaydetme hatası: ',
          loadError: 'Dosya yüklenirken hata oluştu: '
        },
        en: {
          headerTitle: 'Edit',
          pageTitle: 'CSV Data Editor',
          contact: 'Contact',
          contactInfo: 'akkochief@gmail.com · @akkochief',
          copyright: '© 2026 Molytica',
          save: 'Save to Server',
          undo: 'Undo',
          redo: 'Redo',
          addRow: 'Add Row',
          clear: 'Clear All',
          loading: 'Loading file...',
          error: 'Error',
          success: 'Success',
          deleteRow: 'Delete row',
          noData: 'No data yet. Add a new row or load a different file.',
          confirmClear: 'Are you sure you want to delete all data?',
          saveSuccess: 'Data saved successfully!',
          saveError: 'Save error: ',
          loadError: 'Error loading file: '
        }
      };

      function t(key) {
        return translations[currentLang]?.[key] || key;
      }

      function showToast(message, type) {
        type = type || 'info';
        var existing = document.querySelector('.toast');
        if (existing) existing.remove();

        var toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(function() {
          toast.style.opacity = '0';
          toast.style.transition = 'opacity 0.3s ease';
          setTimeout(function() { toast.remove(); }, 300);
        }, 3000);
      }

      function setTheme(d) {
        dark = d;
        document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
        localStorage.setItem('molytica-theme', d ? 'dark' : 'light');
        if (els.themeIcon) {
          els.themeIcon.className = d ? 'fas fa-sun' : 'fas fa-moon';
        }
      }

      function setLanguage(lang) {
        currentLang = lang;
        var t = translations[lang];
        if (!t) return;

        var map = {
          headerTitle: 'headerTitle',
          pageTitle: 'pageTitle',
          contactLabel: 'contact',
          contactInfo: 'contactInfo',
          copyright: 'copyright'
        };

        Object.keys(map).forEach(function(id) {
          var el = els[id];
          if (el) el.textContent = t[map[id]];
        });

        var saveSpan = els.saveBtn?.querySelector('span');
        var undoSpan = els.undoBtn?.querySelector('span');
        var redoSpan = els.redoBtn?.querySelector('span');
        var addSpan = els.addRowBtn?.querySelector('span');
        var clearSpan = els.clearBtn?.querySelector('span');

        if (saveSpan) saveSpan.textContent = t.save;
        if (undoSpan) undoSpan.textContent = t.undo;
        if (redoSpan) redoSpan.textContent = t.redo;
        if (addSpan) addSpan.textContent = t.addRow;
        if (clearSpan) clearSpan.textContent = t.clear;

        if (els.langSwitch) {
          els.langSwitch.textContent = lang.toUpperCase();
        }

        document.querySelectorAll('.action-btn.delete-btn').forEach(function(btn) {
          btn.title = t.deleteRow;
        });

        var emptyState = document.querySelector('.empty-state p');
        if (emptyState) emptyState.textContent = t.noData;
      }

      function updateClock() {
        if (!els.clock) return;
        els.clock.textContent = new Date().toLocaleTimeString(
          currentLang === 'tr' ? 'tr-TR' : 'en-US', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
          }
        );
      }

      function showMessage(message, type) {
        type = type || 'error';
        var icon = type === 'error' ? '!' : type === 'success' ? '✓' : '¡';
        els.msgContainer.innerHTML = '<div class="message ' + type + '"><span class="icon">' + icon + '</span><span>' + message + '</span></div>';
        setTimeout(function() { els.msgContainer.innerHTML = ''; }, 5000);
        if (type === 'success' || type === 'info') {
          showToast(message, type);
        }
      }

      function parseCSVLine(line) {
        var result = [];
        var current = '';
        var inQuotes = false;
        for (var i = 0; i < line.length; i++) {
          var char = line[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
          } else {
            current += char;
          }
        }
        result.push(current.trim());
        return result.map(function(item) { return item.replace(/^"|"$/g, ''); });
      }

      function parseCSV(content) {
        var lines = content.split('\n').filter(function(line) { return line.trim() !== ''; });
        if (lines.length === 0) return;
        headers = parseCSVLine(lines[0]);
        data = lines.slice(1).map(function(line) {
          var values = parseCSVLine(line);
          var row = {};
          headers.forEach(function(header, i) {
            row[header] = values[i] || '';
          });
          return row;
        });
      }

      function renderTable() {
        if (headers.length === 0 || data.length === 0) {
          els.thead.innerHTML = '';
          els.tbody.innerHTML = '<tr><td colspan="1"><div class="empty-state"><i class="fas fa-table"></i><p>' + t('noData') + '</p></div></td></tr>';
          updateButtons();
          return;
        }

        var headerHtml = '';
        headers.forEach(function(h) {
          headerHtml += '<th>' + h + '</th>';
        });
        headerHtml += '<th style="width:60px;text-align:center;">⚙</th>';
        els.thead.innerHTML = headerHtml;

        var fragment = document.createDocumentFragment();
        data.forEach(function(row, rowIndex) {
          var tr = document.createElement('tr');
          tr.dataset.rowId = rowIndex;

          headers.forEach(function(header) {
            var td = document.createElement('td');
            td.textContent = row[header] || '';
            td.dataset.column = header;
            td.contentEditable = true;

            td.addEventListener('focus', function() {
              currentEditCell = this;
              this.classList.add('editing');
              updateButtons();
            });

            td.addEventListener('blur', function() {
              finishEditing(this);
            });

            td.addEventListener('keydown', function(e) {
              if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
              }
              if (e.key === 'Escape') {
                var rowIdx = parseInt(this.parentElement.dataset.rowId);
                var col = this.dataset.column;
                if (!isNaN(rowIdx) && data[rowIdx]) {
                  this.textContent = data[rowIdx][col] || '';
                }
                this.blur();
              }
              if (e.key === 'Tab') {
                var cells = this.parentElement.querySelectorAll('td[contenteditable="true"]');
                var idx = Array.from(cells).indexOf(this);
                if (e.shiftKey && idx > 0) {
                  e.preventDefault();
                  cells[idx - 1].focus();
                } else if (!e.shiftKey && idx < cells.length - 1) {
                  e.preventDefault();
                  cells[idx + 1].focus();
                }
              }
            });

            tr.appendChild(td);
          });

          var actionTd = document.createElement('td');
          actionTd.style.textAlign = 'center';
          var deleteBtn = document.createElement('button');
          deleteBtn.className = 'action-btn delete-btn';
          deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
          deleteBtn.title = t('deleteRow');
          deleteBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (currentEditCell) return;
            var rowIdx = parseInt(this.closest('tr').dataset.rowId);
            if (!isNaN(rowIdx)) {
              if (confirm('Bu satırı silmek istediğinize emin misiniz?')) {
                saveState();
                data.splice(rowIdx, 1);
                renderTable();
              }
            }
          });
          actionTd.appendChild(deleteBtn);
          tr.appendChild(actionTd);

          fragment.appendChild(tr);
        });

        els.tbody.innerHTML = '';
        els.tbody.appendChild(fragment);
        updateButtons();
      }

      function finishEditing(td) {
        if (!td) return;
        var tr = td.closest('tr');
        if (!tr) return;
        var rowIndex = parseInt(tr.dataset.rowId);
        var column = td.dataset.column;
        var newValue = td.textContent.trim();
        var oldValue = data[rowIndex]?.[column] || '';

        if (newValue !== oldValue) {
          saveState();
          data[rowIndex][column] = newValue;
        }

        td.classList.remove('editing');
        if (currentEditCell === td) {
          currentEditCell = null;
        }
        updateButtons();
      }

      function saveState() {
        undoStack.push(JSON.stringify(data));
        if (undoStack.length > 50) undoStack.shift();
        redoStack = [];
        updateButtons();
      }

      function undo() {
        if (undoStack.length === 0 || currentEditCell) return;
        redoStack.push(JSON.stringify(data));
        data = JSON.parse(undoStack.pop());
        renderTable();
      }

      function redo() {
        if (redoStack.length === 0 || currentEditCell) return;
        undoStack.push(JSON.stringify(data));
        data = JSON.parse(redoStack.pop());
        renderTable();
      }

      function updateButtons() {
        var isEditing = !!currentEditCell;
        var hasData = data.length > 0;

        if (els.undoBtn) els.undoBtn.disabled = undoStack.length === 0 || isEditing;
        if (els.redoBtn) els.redoBtn.disabled = redoStack.length === 0 || isEditing;
        if (els.clearBtn) els.clearBtn.disabled = !hasData || isEditing;
        if (els.saveBtn) els.saveBtn.disabled = !hasData || isEditing;
        if (els.addRowBtn) els.addRowBtn.disabled = headers.length === 0 || isEditing;

        if (els.undoCount) els.undoCount.textContent = undoStack.length;
        if (els.redoCount) els.redoCount.textContent = redoStack.length;
      }

      function addNewRow() {
        if (currentEditCell) return;
        if (headers.length === 0) {
          showMessage('Önce bir CSV dosyası yükleyin.', 'error');
          return;
        }
        saveState();
        var newRow = {};
        headers.forEach(function(h) { newRow[h] = ''; });
        data.push(newRow);
        renderTable();

        var lastRow = els.tbody.lastChild;
        if (lastRow) {
          var firstCell = lastRow.querySelector('td[contenteditable="true"]');
          if (firstCell) setTimeout(function() { firstCell.focus(); }, 50);
        }
      }

      function clearAll() {
        if (currentEditCell) return;
        if (data.length === 0) return;
        if (!confirm(t('confirmClear'))) return;

        saveState();
        data = [];
        renderTable();
        showMessage('Tüm veriler temizlendi.', 'info');
      }

      function saveToServer() {
        if (currentEditCell) {
          finishEditing(currentEditCell);
          if (currentEditCell) {
            showMessage('Hücre düzenlemesi tamamlanamadı.', 'error');
            return;
          }
        }

        if (data.length === 0 || headers.length === 0) {
          showMessage('Kaydedilecek veri yok.', 'error');
          return;
        }

        var csvContent = headers.join(',') + '\n';
        csvContent += data.map(function(row) {
          return headers.map(function(h) {
            var val = (row[h] || '').toString();
            if (val.includes(',') || val.includes('"') || val.includes('\n')) {
              return '"' + val.replace(/"/g, '""') + '"';
            }
            return val;
          }).join(',');
        }).join('\n');

        var saveFilename = filename || 'duzenlenmis_veri.csv';

        fetch('/save-csv', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ csv: csvContent, filename: saveFilename })
        })
        .then(function(r) { return r.json(); })
        .then(function(result) {
          if (result.success) {
            showMessage(t('saveSuccess') + ' (' + saveFilename + ')', 'success');
          } else {
            throw new Error(result.message || 'Kayıt başarısız');
          }
        })
        .catch(function(error) {
          showMessage(t('saveError') + error.message, 'error');
        });
      }

      function loadFile() {
        var urlParams = new URLSearchParams(window.location.search);
        var fileParam = urlParams.get('file') || urlParams.get('models') || '';
        filename = fileParam;

        if (!filename) {
          els.filenameDisplay.textContent = 'Dosya belirtilmedi';
          showMessage('URL parametresinde dosya belirtilmedi. Örnek: ?file=dosya.csv', 'error');
          return;
        }

        if (!filename.toLowerCase().endsWith('.csv')) {
          els.filenameDisplay.textContent = 'Geçersiz dosya';
          showMessage('Sadece CSV dosyaları düzenlenebilir.', 'error');
          return;
        }

        els.filenameDisplay.textContent = filename;

        fetch('/static/datasets/' + filename)
          .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status + ' - Dosya bulunamadı');
            return r.text();
          })
          .then(function(content) {
            parseCSV(content);
            if (data.length === 0) {
              showMessage('CSV dosyası yüklendi ancak veri içermiyor.', 'info');
            } else {
              showMessage('CSV başarıyla yüklendi: ' + filename + ' (' + data.length + ' satır)', 'success');
            }
            renderTable();
          })
          .catch(function(error) {
            showMessage(t('loadError') + error.message, 'error');
          });
      }

      if (els.logo) {
        els.logo.addEventListener('click', function() { window.location.href = '/'; });
      }

      if (els.langSwitch) {
        els.langSwitch.addEventListener('click', function() {
          setLanguage(currentLang === 'tr' ? 'en' : 'tr');
          this.classList.add('animate');
          setTimeout(function() { this.classList.remove('animate'); }.bind(this), 200);
        });
      }

      if (els.themeToggle) {
        els.themeToggle.addEventListener('click', function() { setTheme(!dark); });
      }

      if (els.saveBtn) els.saveBtn.addEventListener('click', saveToServer);
      if (els.undoBtn) els.undoBtn.addEventListener('click', undo);
      if (els.redoBtn) els.redoBtn.addEventListener('click', redo);
      if (els.addRowBtn) els.addRowBtn.addEventListener('click', addNewRow);
      if (els.clearBtn) els.clearBtn.addEventListener('click', clearAll);

      document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
          e.preventDefault();
          if (!els.undoBtn.disabled) undo();
        }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) {
          e.preventDefault();
          if (!els.redoBtn.disabled) redo();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          if (!els.saveBtn.disabled) saveToServer();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
          e.preventDefault();
          if (!els.addRowBtn.disabled) addNewRow();
        }
      });

      setTheme(dark);
      setLanguage('tr');
      updateClock();
      setInterval(updateClock, 1000);
      loadFile();

    })();
  </script>
</body>
</html>
