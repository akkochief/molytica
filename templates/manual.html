<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Molytica - Veri Girişi</title>
    <link rel="icon" href="{{ url_for('static', filename='assets/favicon.ico') }}" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f6f7f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-header: rgba(255, 255, 255, 0.88);
            --bg-input: #f1f3f5;
            --bg-hover: #f1f4f9;
            --text-primary: #0a0a0a;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.18);
            --border-focus: rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.06);
            --btn-bg: #ffffff;
            --btn-text: #0a0a0a;
            --btn-hover: #0a0a0a;
            --btn-hover-text: #ffffff;
            --footer-bg: #0a0a0a;
            --footer-text: #d0d0d0;
            --clock-bg: #eef0f2;
            --clock-text: #3a3a3a;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 100px;
            --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --font: 'Inter', -apple-system, system-ui, sans-serif;
        }

        [data-theme="dark"] {
            --bg-primary: #0d0d0d;
            --bg-secondary: #161616;
            --bg-card: #1a1a1a;
            --bg-header: rgba(20, 20, 20, 0.92);
            --bg-input: #282828;
            --bg-hover: #2a2a2a;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --text-muted: #707070;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.14);
            --border-focus: rgba(255, 255, 255, 0.25);
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.5);
            --btn-bg: #222222;
            --btn-text: #f0f0f0;
            --btn-hover: #f0f0f0;
            --btn-hover-text: #0a0a0a;
            --footer-bg: #0a0a0a;
            --footer-text: #888888;
            --clock-bg: #282828;
            --clock-text: #c0c0c0;
        }

        body {
            background: var(--bg-primary);
            font-family: var(--font);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        header {
            background: var(--bg-header);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background var(--transition), border-color var(--transition);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            height: 38px;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: brightness(0);
        }
        [data-theme="dark"] .logo {
            filter: brightness(0) invert(1);
        }
        .logo:hover {
            transform: scale(1.05) rotate(-1deg);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            transition: color var(--transition);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #clock {
            font-size: 0.85rem;
            font-weight: 450;
            color: var(--clock-text);
            background: var(--clock-bg);
            padding: 4px 14px;
            border-radius: var(--radius-xl);
            letter-spacing: 0.4px;
            font-variant-numeric: tabular-nums;
            transition: all var(--transition);
        }

        .theme-toggle {
            background: var(--clock-bg);
            border: none;
            border-radius: var(--radius-xl);
            padding: 6px 12px;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .theme-toggle:hover {
            transform: scale(0.95);
        }

        .lang-btn {
            background: transparent;
            border: 1.5px solid var(--border-hover);
            border-radius: var(--radius-xl);
            padding: 5px 14px;
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .lang-btn:hover {
            background: var(--text-primary);
            color: var(--bg-primary);
            transform: scale(0.95);
        }
        .lang-btn.animate {
            transform: scale(0.92);
            transition: transform 0.15s ease;
        }

        main {
            flex: 1;
            display: flex;
            padding: 32px 40px;
            gap: 28px;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
            animation: fadeUp 0.7s ease forwards;
        }

        .form-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            width: 380px;
            min-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            max-height: calc(100vh - 140px);
            overflow: hidden;
            position: relative;
        }
        .form-panel:hover {
            box-shadow: var(--shadow-md);
        }

        .form-panel h2 {
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.02em;
            transition: color var(--transition);
            flex-shrink: 0;
        }
        .form-panel h2::after {
            content: '';
            display: block;
            width: 32px;
            height: 2px;
            background: var(--text-primary);
            margin: 4px auto 0;
            transition: width 0.3s ease;
        }
        .form-panel:hover h2::after {
            width: 48px;
        }

        #dataForm {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            gap: 6px;
        }

        .form-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .form-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .form-scroll::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 4px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        label {
            font-weight: 500;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            text-transform: uppercase;
            transition: color var(--transition);
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 7px 12px;
            font-size: 0.85rem;
            font-family: var(--font);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none;
        }
        input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.04);
        }
        [data-theme="dark"] input:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
        }

        .form-actions {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            padding: 10px 0 0 0;
            margin: 0 -20px -24px -20px;
            padding: 10px 20px 16px 20px;
            border-top: 1px solid var(--border-color);
            transition: background var(--transition), border-color var(--transition);
            z-index: 10;
            flex-shrink: 0;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--btn-bg);
            color: var(--btn-text);
            position: relative;
            overflow: hidden;
            min-width: 90px;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--btn-hover);
            transform: translateX(-100%);
            transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: -1;
        }
        .btn:hover:not(:disabled) {
            color: var(--btn-hover-text);
            border-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .btn:hover::before {
            transform: translateX(0);
        }
        .btn:active {
            transform: translateY(0) scale(0.97);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }
        .btn-primary::before {
            background: var(--bg-primary);
        }
        .btn-primary:hover {
            color: var(--text-primary);
            border-color: var(--bg-primary);
        }

        .table-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            min-width: 0;
        }
        .table-panel:hover {
            box-shadow: var(--shadow-md);
        }

        .table-panel h2 {
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 10px;
            letter-spacing: -0.02em;
            transition: color var(--transition);
            flex-shrink: 0;
        }
        .table-panel h2::after {
            content: '';
            display: block;
            width: 32px;
            height: 2px;
            background: var(--text-primary);
            margin: 4px auto 0;
            transition: width 0.3s ease;
        }
        .table-panel:hover h2::after {
            width: 48px;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .toolbar .btn {
            padding: 6px 16px;
            min-width: auto;
            font-size: 0.75rem;
        }

        .table-wrapper {
            flex: 1;
            overflow: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            transition: border-color var(--transition);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            min-width: 700px;
        }

        thead {
            background: var(--bg-input);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        thead th {
            padding: 10px 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            transition: color var(--transition);
        }

        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: background var(--transition);
        }
        tbody tr:hover {
            background: var(--bg-hover);
        }
        tbody tr:last-child {
            border-bottom: none;
        }

        tbody td {
            padding: 8px 10px;
            text-align: center;
            color: var(--text-primary);
            transition: color var(--transition);
        }

        tbody td[contenteditable="true"] {
            cursor: text;
            outline: none;
            border-radius: 4px;
            transition: all var(--transition);
        }
        tbody td[contenteditable="true"]:focus {
            background: var(--bg-input);
            box-shadow: inset 0 0 0 1px var(--border-focus);
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 6px;
            transition: all var(--transition);
            border-radius: 4px;
        }
        .action-btn:hover {
            color: #d33;
            background: rgba(221, 51, 51, 0.08);
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-input);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--border-hover) var(--bg-input);
        }

        footer {
            background: var(--footer-bg);
            color: var(--footer-text);
            padding: 24px 24px 16px;
            margin-top: 0;
            border-top: 1px solid var(--border-color);
            transition: background var(--transition), border-color var(--transition);
        }
        .footer-content {
            max-width: 1440px;
            margin: 0 auto;
            text-align: center;
        }
        .footer-content .contact {
            font-size: 0.85rem;
            margin-bottom: 10px;
            opacity: 0.7;
            letter-spacing: 0.2px;
        }
        .footer-content .contact strong {
            opacity: 1;
            color: #fff;
            font-weight: 500;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 12px 0 14px;
        }
        .social-icons a {
            color: #888;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            opacity: 0.5;
        }
        .social-icons a:hover {
            color: #fff;
            transform: translateY(-2px);
            opacity: 1;
        }
        .copyright {
            font-size: 0.7rem;
            opacity: 0.35;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        @media (max-width: 1024px) {
            main {
                flex-direction: column;
                padding: 20px 16px;
                gap: 16px;
            }
            .form-panel {
                width: 100%;
                min-width: auto;
                max-height: none;
            }
            .form-panel h2::after,
            .table-panel h2::after {
                width: 48px;
            }
            .form-actions {
                margin: 0 -16px -20px -16px;
                padding: 10px 16px 16px 16px;
            }
            .form-scroll {
                padding-bottom: 60px;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 10px 16px;
            }
            .logo {
                height: 28px;
            }
            header h1 {
                font-size: 0.9rem;
            }
            #clock {
                display: none;
            }
            .theme-toggle {
                padding: 4px 8px;
                font-size: 0.8rem;
            }
            .lang-btn {
                padding: 4px 8px;
                font-size: 0.6rem;
            }
            main {
                padding: 12px;
                gap: 12px;
            }
            .form-panel {
                padding: 16px 14px;
            }
            .table-panel {
                padding: 14px 10px;
            }
            .toolbar {
                justify-content: center;
            }
            .toolbar .btn {
                padding: 5px 12px;
                font-size: 0.7rem;
                min-width: auto;
            }
            table {
                font-size: 0.7rem;
                min-width: 550px;
            }
            thead th {
                padding: 6px 8px;
                font-size: 0.6rem;
            }
            tbody td {
                padding: 5px 6px;
            }
            .buttons {
                flex-wrap: wrap;
            }
            .btn {
                padding: 8px 16px;
                font-size: 0.8rem;
                min-width: 70px;
            }
            footer {
                padding: 16px 14px 12px;
            }
            .social-icons {
                gap: 14px;
            }
            .social-icons a {
                font-size: 0.95rem;
            }
            .form-actions {
                margin: 0 -10px -14px -10px;
                padding: 10px 10px 14px 10px;
            }
            .form-scroll {
                padding-bottom: 50px;
            }
            input[type="text"],
            input[type="number"] {
                padding: 6px 10px;
                font-size: 0.8rem;
            }
            label {
                font-size: 0.65rem;
            }
            .form-scroll {
                gap: 4px;
            }
            .form-group {
                gap: 1px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 0.8rem;
            }
            .lang-btn {
                font-size: 0.55rem;
                padding: 2px 6px;
            }
            .theme-toggle {
                padding: 2px 6px;
                font-size: 0.7rem;
            }
            .form-panel h2,
            .table-panel h2 {
                font-size: 1rem;
            }
            input[type="text"],
            input[type="number"] {
                padding: 5px 8px;
                font-size: 0.75rem;
            }
            .btn {
                padding: 7px 14px;
                font-size: 0.75rem;
                min-width: 60px;
            }
            .form-actions {
                margin: 0 -8px -12px -8px;
                padding: 8px 8px 12px 8px;
            }
            .form-panel {
                padding: 12px 10px;
            }
            .form-scroll {
                padding-bottom: 40px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="Molytica" class="logo" id="logo" />
            <h1 id="headerTitle">Manual Editing</h1>
        </div>
        <div class="header-right">
            <div id="clock"></div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button class="lang-btn" id="langSwitch">TR</button>
        </div>
    </header>

    <main>
        <div class="form-panel">
            <h2 id="formTitle">Veri Girişi</h2>
            <form id="dataForm" autocomplete="off" novalidate>
                <div class="form-scroll">
                    <div class="form-group">
                        <label for="filename" id="labelFilename">Dosya Adı</label>
                        <input type="text" id="filename" placeholder="veri_ornegi" required />
                    </div>

                    <div class="form-group">
                        <label for="ArB" id="labelArB">Ar-B(OH)₂</label>
                        <input type="text" id="ArB" />
                    </div>

                    <div class="form-group">
                        <label for="ArX" id="labelArX">Ar-X</label>
                        <input type="text" id="ArX" />
                    </div>

                    <div class="form-group">
                        <label for="Product" id="labelProduct">Product</label>
                        <input type="text" id="Product" />
                    </div>

                    <div class="form-group">
                        <label for="Catalizor" id="labelCatalizor">Catalizor</label>
                        <input type="text" id="Catalizor" />
                    </div>

                    <div class="form-group">
                        <label for="Base" id="labelBase">Base</label>
                        <input type="text" id="Base" />
                    </div>

                    <div class="form-group">
                        <label for="Solv1" id="labelSolv1">Solv1</label>
                        <input type="text" id="Solv1" />
                    </div>

                    <div class="form-group">
                        <label for="Solv2" id="labelSolv2">Solv2</label>
                        <input type="text" id="Solv2" />
                    </div>

                    <div class="form-group">
                        <label for="Amount" id="labelAmount">Amount</label>
                        <input type="number" id="Amount" step="0.0001" min="0" />
                    </div>

                    <div class="form-group">
                        <label for="Centigrades" id="labelCentigrades">Centigrades</label>
                        <input type="number" id="Centigrades" step="1" min="0" />
                    </div>

                    <div class="form-group">
                        <label for="Minute" id="labelMinute">Minute</label>
                        <input type="number" id="Minute" step="1" min="0" />
                    </div>

                    <div class="form-group">
                        <label for="Cycle" id="labelCycle">Cycle</label>
                        <input type="number" id="Cycle" step="1" min="0" />
                    </div>

                    <div class="form-group">
                        <label for="Yield" id="labelYield">Yield</label>
                        <input type="number" id="Yield" step="1" min="0" max="100" />
                    </div>
                </div>

                <div class="form-actions">
                    <div class="buttons">
                        <button type="button" class="btn btn-primary" id="addBtn">Ekle</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="table-panel">
            <h2 id="tableTitle">Kaydedilen Veriler</h2>
            <div class="toolbar">
                <button class="btn" id="undoBtn" disabled>Geri Al</button>
                <button class="btn" id="redoBtn" disabled>Yinele</button>
                <button class="btn" id="exportBtn">CSV Kaydet</button>
            </div>
            <div class="table-wrapper">
                <table id="savedDataTable">
                    <thead>
                        <tr>
                            <th id="thArB">Ar-B(OH)₂</th>
                            <th id="thArX">Ar-X</th>
                            <th id="thProduct">Product</th>
                            <th id="thCatalizor">Catalizor</th>
                            <th id="thBase">Base</th>
                            <th id="thSolv1">Solv1</th>
                            <th id="thSolv2">Solv2</th>
                            <th id="thAmount">Amount</th>
                            <th id="thCentigrades">Centigrades</th>
                            <th id="thMinute">Minute</th>
                            <th id="thCycle">Cycle</th>
                            <th id="thYield">Yield</th>
                            <th id="thAction">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

  <footer>
    <div class="footer-content">
      <div class="contact">
        <strong id="contactLabel">İletişim</strong>
        <span id="contactInfo">akkochief@gmail.com · @akkochief</span>
      </div>
      <div class="social-icons">
        <a href="https://x.com/akkochief" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="https://github.com/akkocchief" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/akkochief/" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <div class="copyright" id="copyright">© 2026 Molytica</div>
    </div>
  </footer>

    <script>
        (function() {
            'use strict';

            var translations = {
                tr: {
                    headerTitle: 'Manual Edit',
                    formTitle: 'Veri Girişi',
                    tableTitle: 'Kaydedilen Veriler',
                    add: 'Ekle',
                    undo: 'Geri Al',
                    redo: 'Yinele',
                    export: 'CSV Kaydet',
                    contact: 'İletişim',
                    contactInfo: 'akkochief@gmail.com · @akkochief',
                    copyright: '© 2026 Molytica',
                    deleteTitle: 'Satırı sil',
                    labelFilename: 'Dosya Adı',
                    labelArB: 'Ar-B(OH)₂',
                    labelArX: 'Ar-X',
                    labelProduct: 'Product',
                    labelCatalizor: 'Catalizor',
                    labelBase: 'Base',
                    labelSolv1: 'Solv1',
                    labelSolv2: 'Solv2',
                    labelAmount: 'Amount',
                    labelCentigrades: 'Centigrades',
                    labelMinute: 'Minute',
                    labelCycle: 'Cycle',
                    labelYield: 'Yield',
                    thArB: 'Ar-B(OH)₂',
                    thArX: 'Ar-X',
                    thProduct: 'Product',
                    thCatalizor: 'Catalizor',
                    thBase: 'Base',
                    thSolv1: 'Solv1',
                    thSolv2: 'Solv2',
                    thAmount: 'Amount',
                    thCentigrades: 'Centigrades',
                    thMinute: 'Minute',
                    thCycle: 'Cycle',
                    thYield: 'Yield',
                    thAction: 'İşlem',
                    placeholderFilename: 'veri_ornegi',
                    empty: 'Lütfen en az bir veri alanını doldurun.',
                    saved: 'Veriler başarıyla kaydedildi!',
                    saving: 'Veriler kaydediliyor...',
                    filenameRequired: 'Lütfen bir dosya adı girin.',
                    exportPrompt: 'Dosya adı girin:',
                    exportDefault: 'data'
                },
                en: {
                    headerTitle: 'Manual Edit',
                    formTitle: 'Data Entry',
                    tableTitle: 'Saved Data',
                    add: 'Add',
                    undo: 'Undo',
                    redo: 'Redo',
                    export: 'Save CSV',
                    contact: 'Contact',
                    contactInfo: 'akkochief@gmail.com · @akkochief',
                    copyright: '© 2026 Molytica',
                    deleteTitle: 'Delete row',
                    labelFilename: 'Filename',
                    labelArB: 'Ar-B(OH)₂',
                    labelArX: 'Ar-X',
                    labelProduct: 'Product',
                    labelCatalizor: 'Catalizor',
                    labelBase: 'Base',
                    labelSolv1: 'Solv1',
                    labelSolv2: 'Solv2',
                    labelAmount: 'Amount',
                    labelCentigrades: 'Centigrades',
                    labelMinute: 'Minute',
                    labelCycle: 'Cycle',
                    labelYield: 'Yield',
                    thArB: 'Ar-B(OH)₂',
                    thArX: 'Ar-X',
                    thProduct: 'Product',
                    thCatalizor: 'Catalizor',
                    thBase: 'Base',
                    thSolv1: 'Solv1',
                    thSolv2: 'Solv2',
                    thAmount: 'Amount',
                    thCentigrades: 'Centigrades',
                    thMinute: 'Minute',
                    thCycle: 'Cycle',
                    thYield: 'Yield',
                    thAction: 'Action',
                    placeholderFilename: 'data_example',
                    empty: 'Please fill at least one data field.',
                    saved: 'Data saved successfully!',
                    saving: 'Saving data...',
                    filenameRequired: 'Please enter a filename.',
                    exportPrompt: 'Enter filename:',
                    exportDefault: 'data'
                }
            };

            var COLUMNS = [
                'ArB', 'ArX', 'Product', 'Catalizor', 'Base',
                'Solv1', 'Solv2', 'Amount', 'Centigrades', 'Minute', 'Cycle', 'Yield'
            ];

            var dataRows = [];
            var undoStack = [];
            var redoStack = [];
            var currentLang = 'tr';
            var dark = localStorage.getItem('molytica-theme') === 'dark';

            var $ = function(id) { return document.getElementById(id); };
            var tableBody = $('tableBody');
            var addBtn = $('addBtn');
            var undoBtn = $('undoBtn');
            var redoBtn = $('redoBtn');
            var exportBtn = $('exportBtn');
            var langSwitch = $('langSwitch');
            var themeToggle = $('themeToggle');
            var themeIcon = $('themeIcon');
            var logo = $('logo');

            function setTheme(d) {
                dark = d;
                document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
                localStorage.setItem('molytica-theme', d ? 'dark' : 'light');
                if (themeIcon) {
                    themeIcon.className = d ? 'fas fa-sun' : 'fas fa-moon';
                }
            }

            function setLanguage(lang) {
                currentLang = lang;
                var t = translations[lang];
                if (!t) return;

                var labelMap = {
                    'labelFilename': 'labelFilename',
                    'labelArB': 'labelArB',
                    'labelArX': 'labelArX',
                    'labelProduct': 'labelProduct',
                    'labelCatalizor': 'labelCatalizor',
                    'labelBase': 'labelBase',
                    'labelSolv1': 'labelSolv1',
                    'labelSolv2': 'labelSolv2',
                    'labelAmount': 'labelAmount',
                    'labelCentigrades': 'labelCentigrades',
                    'labelMinute': 'labelMinute',
                    'labelCycle': 'labelCycle',
                    'labelYield': 'labelYield'
                };

                var thMap = {
                    'thArB': 'thArB',
                    'thArX': 'thArX',
                    'thProduct': 'thProduct',
                    'thCatalizor': 'thCatalizor',
                    'thBase': 'thBase',
                    'thSolv1': 'thSolv1',
                    'thSolv2': 'thSolv2',
                    'thAmount': 'thAmount',
                    'thCentigrades': 'thCentigrades',
                    'thMinute': 'thMinute',
                    'thCycle': 'thCycle',
                    'thYield': 'thYield',
                    'thAction': 'thAction'
                };

                var headerMap = {
                    'headerTitle': 'headerTitle',
                    'formTitle': 'formTitle',
                    'tableTitle': 'tableTitle',
                    'contactLabel': 'contact',
                    'contactInfo': 'contactInfo',
                    'copyright': 'copyright'
                };

                Object.keys(headerMap).forEach(function(id) {
                    var el = $(id);
                    if (el) el.textContent = t[headerMap[id]];
                });

                if ($('addBtn')) $('addBtn').textContent = t.add;
                if ($('undoBtn')) $('undoBtn').textContent = t.undo;
                if ($('redoBtn')) $('redoBtn').textContent = t.redo;
                if ($('exportBtn')) $('exportBtn').textContent = t.export;

                Object.keys(labelMap).forEach(function(id) {
                    var el = $(id);
                    if (el) el.textContent = t[labelMap[id]];
                });

                Object.keys(thMap).forEach(function(id) {
                    var el = $(id);
                    if (el) el.textContent = t[thMap[id]];
                });

                var filenameInput = $('filename');
                if (filenameInput) filenameInput.placeholder = t.placeholderFilename;

                if (langSwitch) langSwitch.textContent = lang.toUpperCase();

                document.querySelectorAll('.action-btn').forEach(function(btn) {
                    btn.title = t.deleteTitle;
                });

                updateUndoRedoButtons();
                updateClock();
            }

            function updateClock() {
                var clock = $('clock');
                if (!clock) return;
                clock.textContent = new Date().toLocaleTimeString(
                    currentLang === 'tr' ? 'tr-TR' : 'en-US', {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    }
                );
            }

            function saveState() {
                undoStack.push(JSON.stringify(dataRows));
                if (undoStack.length > 50) undoStack.shift();
                redoStack = [];
                updateUndoRedoButtons();
            }

            function undo() {
                if (undoStack.length === 0) return;
                redoStack.push(JSON.stringify(dataRows));
                dataRows = JSON.parse(undoStack.pop());
                renderTable();
            }

            function redo() {
                if (redoStack.length === 0) return;
                undoStack.push(JSON.stringify(dataRows));
                dataRows = JSON.parse(redoStack.pop());
                renderTable();
            }

            function updateUndoRedoButtons() {
                if (undoBtn) undoBtn.disabled = undoStack.length === 0;
                if (redoBtn) redoBtn.disabled = redoStack.length === 0;
            }

            function renderTable() {
                var t = translations[currentLang];
                if (!tableBody) return;
                tableBody.innerHTML = '';

                dataRows.forEach(function(row, idx) {
                    var tr = document.createElement('tr');

                    COLUMNS.forEach(function(col) {
                        var td = document.createElement('td');
                        td.contentEditable = 'true';
                        td.textContent = row[col] || '';
                        td.dataset.field = col;
                        td.dataset.row = idx;
                        td.addEventListener('input', handleCellEdit);
                        tr.appendChild(td);
                    });

                    var actionTd = document.createElement('td');
                    var delBtn = document.createElement('button');
                    delBtn.className = 'action-btn';
                    delBtn.textContent = '✕';
                    delBtn.title = t.deleteTitle;
                    delBtn.addEventListener('click', function() { deleteRow(idx); });
                    actionTd.appendChild(delBtn);
                    tr.appendChild(actionTd);

                    tableBody.appendChild(tr);
                });

                updateUndoRedoButtons();
            }

            function handleCellEdit(e) {
                var row = parseInt(e.target.dataset.row);
                var field = e.target.dataset.field;
                if (!isNaN(row) && dataRows[row]) {
                    saveState();
                    dataRows[row][field] = e.target.textContent;
                }
            }

            function deleteRow(idx) {
                saveState();
                dataRows.splice(idx, 1);
                renderTable();
            }

            function generateCSV() {
                if (dataRows.length === 0) {
                    alert(translations[currentLang].empty);
                    return null;
                }

                var t = translations[currentLang];
                var headers = [
                    t.thArB, t.thArX, t.thProduct, t.thCatalizor, t.thBase,
                    t.thSolv1, t.thSolv2, t.thAmount, t.thCentigrades, t.thMinute,
                    t.thCycle, t.thYield
                ];

                var csv = headers.join(',') + '\n';
                dataRows.forEach(function(row) {
                    var vals = COLUMNS.map(function(col) { return row[col] || ''; });
                    csv += vals.join(',') + '\n';
                });
                return csv;
            }

            function saveToServer(filename, csv) {
                var t = translations[currentLang];
                alert(t.saving);

                fetch('/save_data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: filename.endsWith('.csv') ? filename : filename + '.csv',
                        data: csv
                    })
                })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (result.success) {
                        alert(t.saved);
                    } else {
                        alert('Hata: ' + result.message);
                    }
                })
                .catch(function(err) {
                    alert('Hata: ' + err.message);
                });
            }

            function addData() {
                var t = translations[currentLang];
                var filename = $('filename').value.trim();
                if (!filename) {
                    alert(t.filenameRequired);
                    return;
                }

                var newRow = {};
                var hasData = false;

                COLUMNS.forEach(function(col) {
                    var input = $(col);
                    if (input) {
                        var val = input.value.trim();
                        newRow[col] = val;
                        if (val !== '') hasData = true;
                    } else {
                        newRow[col] = '';
                    }
                });

                if (!hasData) {
                    alert(t.empty);
                    return;
                }

                saveState();
                dataRows.push(newRow);
                renderTable();

                var csv = generateCSV();
                if (csv) {
                    saveToServer(filename, csv);
                    COLUMNS.forEach(function(col) {
                        var input = $(col);
                        if (input) input.value = '';
                    });
                }
            }

            function exportData() {
                var t = translations[currentLang];
                if (dataRows.length === 0) {
                    alert(t.empty);
                    return;
                }
                var filename = prompt(t.exportPrompt, t.exportDefault);
                if (filename) {
                    var csv = generateCSV();
                    if (csv) {
                        saveToServer(filename, csv);
                    }
                }
            }

            if (logo) {
                logo.addEventListener('click', function() { window.location.href = '/'; });
            }

            if (addBtn) addBtn.addEventListener('click', addData);
            if (exportBtn) exportBtn.addEventListener('click', exportData);
            if (undoBtn) undoBtn.addEventListener('click', undo);
            if (redoBtn) redoBtn.addEventListener('click', redo);

            if (langSwitch) {
                langSwitch.addEventListener('click', function() {
                    setLanguage(currentLang === 'tr' ? 'en' : 'tr');
                    this.classList.add('animate');
                    setTimeout(function() { this.classList.remove('animate'); }.bind(this), 200);
                });
            }

            if (themeToggle) {
                themeToggle.addEventListener('click', function() { setTheme(!dark); });
            }

            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                    e.preventDefault();
                    undo();
                }
                if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
                    e.preventDefault();
                    redo();
                }
                if (e.key === 'Enter' && e.target.closest('#dataForm')) {
                    var tag = e.target.tagName.toLowerCase();
                    if (tag !== 'button' && tag !== 'textarea') {
                        e.preventDefault();
                        addData();
                    }
                }
            });

            setTheme(dark);
            setLanguage('tr');
            updateClock();
            setInterval(updateClock, 1000);
            renderTable();

        })();
    </script>
</body>
