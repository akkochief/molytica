<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="{{ url_for('static', filename='assets/favicon.ico') }}" type="image/x-icon">
  <title>Molytica - CSV Veri Düzenleyici</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f6f7f9;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-header: rgba(255, 255, 255, 0.88);
      --bg-input: #f1f3f5;
      --bg-table-hover: #f1f4f9;
      --text-primary: #0a0a0a;
      --text-secondary: #4a4a4a;
      --text-muted: #7a7a7a;
      --border-color: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.18);
      --border-focus: rgba(0, 0, 0, 0.3);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.06);
      --btn-bg: #ffffff;
      --btn-text: #0a0a0a;
      --btn-hover: #0a0a0a;
      --btn-hover-text: #ffffff;
      --footer-bg: #0a0a0a;
      --footer-text: #d0d0d0;
      --clock-bg: #eef0f2;
      --clock-text: #3a3a3a;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --radius-xl: 100px;
      --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --font: 'Inter', -apple-system, system-ui, sans-serif;
      --toast-bg: #0a0a0a;
      --toast-text: #ffffff;
    }

    [data-theme="dark"] {
      --bg-primary: #0d0d0d;
      --bg-secondary: #161616;
      --bg-card: #1a1a1a;
      --bg-header: rgba(20, 20, 20, 0.92);
      --bg-input: #282828;
      --bg-table-hover: #2a2a2a;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #707070;
      --border-color: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.14);
      --border-focus: rgba(255, 255, 255, 0.25);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.5);
      --btn-bg: #222222;
      --btn-text: #f0f0f0;
      --btn-hover: #f0f0f0;
      --btn-hover-text: #0a0a0a;
      --footer-bg: #0a0a0a;
      --footer-text: #888888;
      --clock-bg: #282828;
      --clock-text: #c0c0c0;
      --toast-bg: #f0f0f0;
      --toast-text: #0a0a0a;
    }

    body {
      background: var(--bg-primary);
      font-family: var(--font);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      background: var(--bg-header);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      height: 38px;
      cursor: pointer;
      transition: transform 0.3s ease;
      filter: brightness(0);
    }

    [data-theme="dark"] .logo {
      filter: brightness(0) invert(1);
    }

    .logo:hover {
      transform: scale(1.05) rotate(-1deg);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      transition: color var(--transition);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #clock {
      font-size: 0.85rem;
      font-weight: 450;
      color: var(--clock-text);
      background: var(--clock-bg);
      padding: 4px 14px;
      border-radius: var(--radius-xl);
      letter-spacing: 0.4px;
      font-variant-numeric: tabular-nums;
      transition: all var(--transition);
    }

    .theme-toggle {
      background: var(--clock-bg);
      border: none;
      border-radius: var(--radius-xl);
      padding: 6px 12px;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text-primary);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .theme-toggle:hover {
      transform: scale(0.95);
    }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--border-hover);
      border-radius: var(--radius-xl);
      padding: 5px 14px;
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .lang-btn:hover {
      background: var(--text-primary);
      color: var(--bg-primary);
      transform: scale(0.95);
    }

    .lang-btn.animate {
      transform: scale(0.92);
      transition: transform 0.15s ease;
    }

    .container {
      max-width: 1060px;
      margin: 40px auto;
      padding: 0 24px;
      flex: 1;
      width: 100%;
      animation: fadeUp 0.7s ease forwards;
    }

    .page-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 6px;
      transition: color var(--transition);
    }

    .page-header p {
      font-size: 1.05rem;
      color: var(--text-secondary);
      font-weight: 400;
      transition: color var(--transition);
    }

    .upload-section {
      text-align: center;
      margin-bottom: 24px;
    }

    .upload-btn {
      display: inline-block;
      padding: 12px 36px;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-xl);
      font-family: var(--font);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.3px;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      opacity: 0.9;
    }

    .upload-btn:active {
      transform: translateY(0);
    }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .toolbar .btn {
      padding: 10px 28px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: var(--font);
      font-weight: 500;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
      letter-spacing: 0.15px;
      position: relative;
      overflow: hidden;
      min-width: 100px;
    }

    .toolbar .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--btn-hover);
      transform: translateX(-100%);
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: -1;
    }

    .toolbar .btn:hover:not(:disabled) {
      color: var(--btn-hover-text);
      border-color: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .toolbar .btn:hover:not(:disabled)::before {
      transform: translateX(0);
    }

    .toolbar .btn:active:not(:disabled) {
      transform: translateY(0) scale(0.97);
    }

    .toolbar .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .toolbar .btn .badge {
      display: inline-block;
      background: var(--text-primary);
      color: var(--bg-primary);
      font-size: 0.7rem;
      padding: 0 8px;
      border-radius: var(--radius-xl);
      margin-left: 6px;
      font-weight: 600;
    }

    [data-theme="dark"] .toolbar .btn .badge {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .table-section {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
      transition: all var(--transition);
    }

    .table-section:hover {
      box-shadow: var(--shadow-md);
    }

    .table-section .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .table-section h2 {
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--text-primary);
      transition: color var(--transition);
      margin: 0;
    }

    .table-info {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius-sm);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      color: var(--text-primary);
      transition: color var(--transition);
    }

    thead {
      background: var(--bg-input);
    }

    thead th {
      padding: 12px 16px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border-color);
      text-align: center;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all var(--transition);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    tbody tr {
      transition: background 0.2s ease;
    }

    tbody tr:hover {
      background: var(--bg-table-hover);
    }

    tbody td {
      padding: 10px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
      transition: all var(--transition);
      min-width: 60px;
    }

    tbody td[contenteditable="true"] {
      background: var(--bg-card);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: text;
      transition: all var(--transition);
    }

    tbody td[contenteditable="true"]:hover {
      border-color: var(--border-hover);
    }

    tbody td[contenteditable="true"]:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
      background: var(--bg-input);
    }

    [data-theme="dark"] tbody td[contenteditable="true"]:focus {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      transition: all var(--transition);
      border-radius: var(--radius-sm);
    }

    .action-btn:hover {
      color: #dc2626;
      background: rgba(220, 38, 38, 0.08);
      transform: scale(1.1);
    }

    .add-row-btn {
      margin-top: 16px;
      padding: 8px 20px;
      background: transparent;
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all var(--transition);
      width: 100%;
    }

    .add-row-btn:hover {
      border-color: var(--text-primary);
      color: var(--text-primary);
      background: var(--bg-input);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 1rem;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      animation: fadeIn 0.3s ease;
    }

    .modal-content {
      background: var(--bg-card);
      margin: 15% auto;
      padding: 32px;
      border-radius: var(--radius-md);
      max-width: 420px;
      width: 90%;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
      animation: fadeUp 0.4s ease;
    }

    .modal-content h2 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .modal-content label {
      display: block;
      font-weight: 500;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    .modal-content input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 0.95rem;
      transition: all var(--transition);
      outline: none;
      margin-bottom: 16px;
    }

    .modal-content input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
    }

    [data-theme="dark"] .modal-content input:focus {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-actions .btn {
      padding: 10px 24px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: var(--font);
      font-weight: 500;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all var(--transition);
    }

    .modal-actions .btn-primary {
      background: var(--text-primary);
      color: var(--bg-primary);
      border-color: var(--text-primary);
    }

    .modal-actions .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      opacity: 0.9;
    }

    .modal-actions .btn-secondary:hover {
      background: var(--bg-input);
    }

    .close {
      float: right;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      line-height: 1;
    }

    .close:hover {
      color: var(--text-primary);
      transform: rotate(90deg);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--toast-bg);
      color: var(--toast-text);
      padding: 14px 28px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 3000;
      animation: slideDown 0.4s ease;
      max-width: 400px;
    }

    .toast.success { border-left: 4px solid #22c55e; }
    .toast.error { border-left: 4px solid #ef4444; }
    .toast.info { border-left: 4px solid #3b82f6; }

    footer {
      background: var(--footer-bg);
      color: var(--footer-text);
      padding: 32px 24px 24px;
      margin-top: 40px;
      border-top: 1px solid var(--border-color);
      transition: background var(--transition), border-color var(--transition);
    }

    .footer-content {
      max-width: 1060px;
      margin: 0 auto;
      text-align: center;
    }

    .footer-content .contact {
      font-size: 0.9rem;
      margin-bottom: 14px;
      opacity: 0.7;
      letter-spacing: 0.2px;
    }

    .footer-content .contact strong {
      opacity: 1;
      color: #fff;
      font-weight: 500;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin: 16px 0 18px;
    }

    .social-icons a {
      color: #888;
      font-size: 1.3rem;
      transition: all 0.3s ease;
      opacity: 0.5;
    }

    .social-icons a:hover {
      color: #fff;
      transform: translateY(-2px);
      opacity: 1;
    }

    .copyright {
      font-size: 0.8rem;
      opacity: 0.35;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 768px) {
      header { padding: 12px 20px; }
      .logo { height: 30px; }
      header h1 { font-size: 1rem; }
      #clock { display: none; }
      .theme-toggle { padding: 4px 10px; font-size: 0.85rem; }
      .lang-btn { padding: 4px 10px; font-size: 0.65rem; }
      .container { padding: 0 16px; margin: 24px auto; }
      .page-header h1 { font-size: 1.6rem; }
      .page-header p { font-size: 0.95rem; }
      .toolbar { gap: 10px; }
      .toolbar .btn { padding: 8px 16px; font-size: 0.82rem; min-width: 80px; width: 100%; }
      .upload-btn { padding: 10px 24px; font-size: 0.85rem; width: 100%; }
      .table-section { padding: 16px; }
      .table-section .header-row { flex-direction: column; align-items: flex-start; }
      table { font-size: 0.8rem; }
      thead th, tbody td { padding: 8px 10px; }
      .modal-content { margin: 30% auto; padding: 24px; }
      .modal-actions { flex-direction: column; }
      .modal-actions .btn { width: 100%; text-align: center; }
      footer { padding: 24px 16px; }
      .social-icons a { font-size: 1.1rem; gap: 20px; }
      .toast { bottom: 20px; right: 20px; left: 20px; max-width: none; }
    }

    @media (max-width: 480px) {
      header h1 { font-size: 0.85rem; }
      .lang-btn { font-size: 0.6rem; padding: 3px 8px; }
      .page-header h1 { font-size: 1.3rem; }
      .table-section { padding: 12px; }
      thead th, tbody td { padding: 6px 8px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="Molytica" class="logo" id="logo">
    <h1 id="headerTitle">CSV Veri Düzenleyici</h1>
  </div>
  <div class="header-right">
    <div id="clock"></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <i class="fas fa-moon" id="themeIcon"></i>
    </button>
    <button class="lang-btn" id="langSwitch">TR</button>
  </div>
</header>

<main class="container">
  <div class="page-header">
    <h1 id="pageTitle">CSV Veri Düzenleyici</h1>
    <p id="pageDesc">CSV dosyalarını yükleyin, düzenleyin ve kaydedin</p>
  </div>

  <section class="upload-section">
    <button class="upload-btn" id="uploadBtn">
      <i class="fas fa-upload"></i> <span id="uploadLabel">CSV Yükle</span>
    </button>
    <input type="file" id="csvInput" accept=".csv" style="display:none">
  </section>

  <section class="toolbar">
    <button class="btn" id="saveBtn" disabled>
      <i class="fas fa-save"></i> <span id="saveLabel">Kaydet</span>
    </button>
    <button class="btn" id="undoBtn" disabled>
      <i class="fas fa-undo"></i> <span id="undoLabel">Geri Al</span> <span class="badge" id="undoCount">0</span>
    </button>
    <button class="btn" id="redoBtn" disabled>
      <i class="fas fa-redo"></i> <span id="redoLabel">Yinele</span> <span class="badge" id="redoCount">0</span>
    </button>
    <button class="btn" id="addRowBtn" disabled>
      <i class="fas fa-plus"></i> <span id="addRowLabel">Satır Ekle</span>
    </button>
    <button class="btn" id="clearBtn" disabled>
      <i class="fas fa-trash"></i> <span id="clearLabel">Temizle</span>
    </button>
  </section>

  <section class="table-section">
    <div class="header-row">
      <h2 id="dataTitle">Yüklenen Veriler</h2>
      <span class="table-info" id="rowCount">0 satır</span>
    </div>
    <div class="table-wrapper">
      <table id="dataTable">
        <thead><tr id="tableHeader"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <button class="add-row-btn" id="addRowBtn2" style="display:none;">
      <i class="fas fa-plus"></i> <span id="addRowLabel2">Yeni Satır Ekle</span>
    </button>
  </section>
</main>

  <footer>
    <div class="footer-content">
      <div class="contact">
        <strong id="contactLabel">İletişim</strong>
        <span id="contactInfo">akkochief@gmail.com · @akkochief</span>
      </div>
      <div class="social-icons">
        <a href="https://x.com/akkochief" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="https://github.com/akkocchief" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/akkochief/" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <div class="copyright" id="copyright">© 2026 Molytica</div>
    </div>
  </footer>

<div id="saveModal" class="modal">
  <div class="modal-content">
    <span class="close" id="modalClose">&times;</span>
    <h2 id="modalTitle">Dosyayı Kaydet</h2>
    <label for="filenameInput" id="filenameLabel">Dosya Adı:</label>
    <input type="text" id="filenameInput" placeholder="dosya_adi" value="duzenlenmis_veri">
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalCancel">İptal</button>
      <button class="btn btn-primary" id="confirmSave">Kaydet</button>
    </div>
  </div>
</div>

<script>
  (function() {
    'use strict';

    const translations = {
      tr: {
        headerTitle: 'CSV Veri Düzenleyici',
        pageTitle: 'CSV Veri Düzenleyici',
        pageDesc: 'CSV dosyalarını yükleyin, düzenleyin ve kaydedin',
        uploadLabel: 'CSV Yükle',
        saveLabel: 'Kaydet',
        undoLabel: 'Geri Al',
        redoLabel: 'Yinele',
        addRowLabel: 'Satır Ekle',
        clearLabel: 'Temizle',
        dataTitle: 'Yüklenen Veriler',
        modalTitle: 'Dosyayı Kaydet',
        filenameLabel: 'Dosya Adı:',
        filenamePlaceholder: 'dosya_adi',
        confirmSave: 'Kaydet',
        cancel: 'İptal',
        contact: 'İletişim',
        contactInfo: 'akkochief@gmail.com · @akkochief',
        copyright: '© 2026 Molytica',
        saveSuccess: 'Dosya başarıyla kaydedildi!',
        saveError: 'Kaydetme hatası: ',
        deleteRow: 'Satırı sil',
        emptyState: 'Henüz veri yüklenmedi. CSV dosyası yükleyin veya yeni satır ekleyin.',
        noData: 'Veri yok',
        rows: 'satır',
        confirmClear: 'Tüm verileri silmek istediğinize emin misiniz?',
        uploadError: 'Dosya okuma hatası: ',
        invalidCsv: 'Geçersiz CSV formatı'
      },
      en: {
        headerTitle: 'CSV Data Editor',
        pageTitle: 'CSV Data Editor',
        pageDesc: 'Upload, edit and save CSV files',
        uploadLabel: 'Upload CSV',
        saveLabel: 'Save',
        undoLabel: 'Undo',
        redoLabel: 'Redo',
        addRowLabel: 'Add Row',
        clearLabel: 'Clear',
        dataTitle: 'Uploaded Data',
        modalTitle: 'Save File',
        filenameLabel: 'File Name:',
        filenamePlaceholder: 'file_name',
        confirmSave: 'Save',
        cancel: 'Cancel',
        contact: 'Contact',
        contactInfo: 'akkochief@gmail.com · @akkochief',
        copyright: '© 2026 Molytica',
        saveSuccess: 'File saved successfully!',
        saveError: 'Save error: ',
        deleteRow: 'Delete row',
        emptyState: 'No data loaded yet. Upload a CSV file or add a new row.',
        noData: 'No data',
        rows: 'rows',
        confirmClear: 'Are you sure you want to delete all data?',
        uploadError: 'File read error: ',
        invalidCsv: 'Invalid CSV format'
      }
    };

    let currentLang = 'tr';
    let dark = localStorage.getItem('molytica-theme') === 'dark';
    let dataRows = [];
    let undoStack = [];
    let redoStack = [];
    let headers = [];
    let isUndoRedo = false;
    let fileName = '';

    const $ = id => document.getElementById(id);
    const els = {
      headerTitle: $('headerTitle'),
      pageTitle: $('pageTitle'),
      pageDesc: $('pageDesc'),
      uploadLabel: $('uploadLabel'),
      uploadBtn: $('uploadBtn'),
      csvInput: $('csvInput'),
      saveBtn: $('saveBtn'),
      saveLabel: $('saveLabel'),
      undoBtn: $('undoBtn'),
      undoLabel: $('undoLabel'),
      undoCount: $('undoCount'),
      redoBtn: $('redoBtn'),
      redoLabel: $('redoLabel'),
      redoCount: $('redoCount'),
      addRowBtn: $('addRowBtn'),
      addRowLabel: $('addRowLabel'),
      addRowBtn2: $('addRowBtn2'),
      addRowLabel2: $('addRowLabel2'),
      clearBtn: $('clearBtn'),
      clearLabel: $('clearLabel'),
      dataTitle: $('dataTitle'),
      rowCount: $('rowCount'),
      tableHeader: $('tableHeader'),
      tableBody: $('tableBody'),
      modal: $('saveModal'),
      modalTitle: $('modalTitle'),
      filenameLabel: $('filenameLabel'),
      filenameInput: $('filenameInput'),
      confirmSaveBtn: $('confirmSave'),
      modalCancel: $('modalCancel'),
      modalClose: $('modalClose'),
      contactLabel: $('contactLabel'),
      contactInfo: $('contactInfo'),
      copyright: $('copyright'),
      langSwitch: $('langSwitch'),
      themeToggle: $('themeToggle'),
      themeIcon: $('themeIcon'),
      logo: $('logo'),
      clock: $('clock')
    };

    function setTheme(d) {
      dark = d;
      document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
      localStorage.setItem('molytica-theme', d ? 'dark' : 'light');
      if (els.themeIcon) {
        els.themeIcon.className = d ? 'fas fa-sun' : 'fas fa-moon';
      }
    }

    function setLanguage(lang) {
      currentLang = lang;
      const t = translations[lang];
      if (!t) return;

      const map = {
        headerTitle: 'headerTitle',
        pageTitle: 'pageTitle',
        pageDesc: 'pageDesc',
        uploadLabel: 'uploadLabel',
        saveLabel: 'saveLabel',
        undoLabel: 'undoLabel',
        redoLabel: 'redoLabel',
        addRowLabel: 'addRowLabel',
        addRowLabel2: 'addRowLabel',
        clearLabel: 'clearLabel',
        dataTitle: 'dataTitle',
        modalTitle: 'modalTitle',
        filenameLabel: 'filenameLabel',
        confirmSave: 'confirmSave',
        contactLabel: 'contact',
        contactInfo: 'contactInfo',
        copyright: 'copyright'
      };

      Object.entries(map).forEach(([id, key]) => {
        const el = $(id);
        if (el) el.textContent = t[key];
      });

      if (els.filenameInput) {
        els.filenameInput.placeholder = t.filenamePlaceholder;
      }
      if (els.modalCancel) {
        els.modalCancel.textContent = t.cancel;
      }
      if (els.langSwitch) {
        els.langSwitch.textContent = lang.toUpperCase();
      }

      document.querySelectorAll('.action-btn').forEach(btn => {
        btn.title = t.deleteRow;
      });
    }

    function updateClock() {
      if (!els.clock) return;
      els.clock.textContent = new Date().toLocaleTimeString(
        currentLang === 'tr' ? 'tr-TR' : 'en-US', {
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        }
      );
    }

    function showToast(message, type) {
      type = type || 'info';
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease';
        setTimeout(function() { toast.remove(); }, 300);
      }, 3000);
    }

    function renderTable() {
      const t = translations[currentLang];
      const hasData = dataRows.length > 0;

      if (!hasData && headers.length === 0) {
        els.tableHeader.innerHTML = '';
        els.tableBody.innerHTML = `
          <tr>
            <td colspan="1" style="padding: 40px 20px;">
              <div class="empty-state">
                <i class="fas fa-table"></i>
                <p>${t.emptyState}</p>
              </div>
            </td>
          </tr>
        `;
        els.rowCount.textContent = '0 ' + t.rows;
        els.addRowBtn2.style.display = 'none';
        updateButtons();
        return;
      }

      if (headers.length === 0 && dataRows.length > 0) {
        headers = Object.keys(dataRows[0]);
      }

      let headerHtml = '';
      headers.forEach(function(h) {
        headerHtml += '<th>' + h + '</th>';
      });
      headerHtml += '<th style="width:50px;">⚙</th>';
      els.tableHeader.innerHTML = headerHtml;

      let bodyHtml = '';
      dataRows.forEach(function(row, rowIndex) {
        bodyHtml += '<tr>';
        headers.forEach(function(key) {
          var value = (row[key] !== undefined && row[key] !== null) ? row[key] : '';
          bodyHtml += '<td contenteditable="true" data-key="' + key + '" data-index="' + rowIndex + '">' + value + '</td>';
        });
        bodyHtml += '<td><button class="action-btn" data-index="' + rowIndex + '" title="' + t.deleteRow + '">✕</button></td>';
        bodyHtml += '</tr>';
      });
      els.tableBody.innerHTML = bodyHtml;

      els.rowCount.textContent = dataRows.length + ' ' + t.rows;
      els.addRowBtn2.style.display = 'block';

      var editableCells = els.tableBody.querySelectorAll('td[contenteditable="true"]');
      editableCells.forEach(function(td) {
        td.addEventListener('input', function() {
          if (isUndoRedo) return;
          var rowIndex = parseInt(this.dataset.index);
          var key = this.dataset.key;
          if (!isNaN(rowIndex) && dataRows[rowIndex]) {
            saveStateForUndo();
            dataRows[rowIndex][key] = this.textContent;
            updateRowCount();
          }
        });

        td.addEventListener('keydown', function(e) {
          if (e.key === 'Tab' && !e.shiftKey) {
            var next = this.nextElementSibling;
            if (next && next.contentEditable === 'true') {
              e.preventDefault();
              next.focus();
            }
          } else if (e.key === 'Tab' && e.shiftKey) {
            var prev = this.previousElementSibling;
            if (prev && prev.contentEditable === 'true') {
              e.preventDefault();
              prev.focus();
            }
          } else if (e.key === 'Enter') {
            e.preventDefault();
            var next = this.nextElementSibling;
            if (next && next.contentEditable === 'true') {
              next.focus();
            }
          }
        });
      });

      var actionBtns = els.tableBody.querySelectorAll('.action-btn');
      actionBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var index = parseInt(this.dataset.index);
          if (!isNaN(index)) {
            saveStateForUndo();
            dataRows.splice(index, 1);
            renderTable();
          }
        });
      });

      updateButtons();
    }

    function updateRowCount() {
      const t = translations[currentLang];
      if (els.rowCount) {
        els.rowCount.textContent = dataRows.length + ' ' + t.rows;
      }
    }

    function saveStateForUndo() {
      if (isUndoRedo) return;
      undoStack.push(JSON.stringify(dataRows));
      if (undoStack.length > 50) undoStack.shift();
      redoStack = [];
      updateUndoRedoCounts();
      updateButtons();
    }

    function updateUndoRedoCounts() {
      if (els.undoCount) els.undoCount.textContent = undoStack.length;
      if (els.redoCount) els.redoCount.textContent = redoStack.length;
    }

    function updateButtons() {
      var hasData = dataRows.length > 0;
      var hasHeaders = headers.length > 0;

      if (els.saveBtn) els.saveBtn.disabled = !hasData;
      if (els.undoBtn) els.undoBtn.disabled = undoStack.length === 0;
      if (els.redoBtn) els.redoBtn.disabled = redoStack.length === 0;
      if (els.addRowBtn) els.addRowBtn.disabled = !hasHeaders;
      if (els.addRowBtn2) els.addRowBtn2.style.display = hasHeaders ? 'block' : 'none';
      if (els.clearBtn) els.clearBtn.disabled = !hasData;

      updateUndoRedoCounts();
    }

    function undo() {
      if (undoStack.length === 0) return;
      isUndoRedo = true;
      redoStack.push(JSON.stringify(dataRows));
      dataRows = JSON.parse(undoStack.pop());
      renderTable();
      isUndoRedo = false;
      updateButtons();
    }

    function redo() {
      if (redoStack.length === 0) return;
      isUndoRedo = true;
      undoStack.push(JSON.stringify(dataRows));
      dataRows = JSON.parse(redoStack.pop());
      renderTable();
      isUndoRedo = false;
      updateButtons();
    }

    function handleFileUpload() {
      var file = els.csvInput.files[0];
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var content = e.target.result.trim();
          if (!content) {
            showToast(translations[currentLang].invalidCsv, 'error');
            return;
          }

          var rows = content.split('\n').map(function(r) {
            return r.split(',').map(function(c) { return c.trim(); });
          });

          if (rows.length < 2) {
            showToast(translations[currentLang].invalidCsv, 'error');
            return;
          }

          fileName = file.name.replace(/\.csv$/i, '');
          if (els.filenameInput) {
            els.filenameInput.value = fileName;
          }

          headers = rows[0].map(function(h) { return h.trim(); });
          dataRows = rows.slice(1).map(function(row) {
            var obj = {};
            headers.forEach(function(h, i) {
              obj[h] = (row[i] || '').trim();
            });
            return obj;
          }).filter(function(row) {
            var vals = Object.values(row);
            return vals.some(function(v) { return v !== ''; });
          });

          saveStateForUndo();
          renderTable();
          showToast('✅ ' + dataRows.length + ' satır yüklendi', 'success');
        } catch (err) {
          showToast(translations[currentLang].uploadError + err.message, 'error');
        }
      };
      reader.onerror = function() {
        showToast(translations[currentLang].uploadError + 'Dosya okunamadı', 'error');
      };
      reader.readAsText(file);
      els.csvInput.value = '';
    }

    function addRow() {
      if (headers.length === 0) {
        showToast('Önce bir CSV dosyası yükleyin', 'info');
        return;
      }

      saveStateForUndo();
      var newRow = {};
      headers.forEach(function(h) { newRow[h] = ''; });
      dataRows.push(newRow);
      renderTable();
    }

    function clearAll() {
      if (dataRows.length === 0) return;
      if (!confirm(translations[currentLang].confirmClear)) return;

      saveStateForUndo();
      dataRows = [];
      renderTable();
      showToast('Veriler temizlendi', 'info');
    }

    function saveFile() {
      if (dataRows.length === 0) {
        showToast('Kaydedilecek veri yok', 'error');
        return;
      }
      if (els.modal) {
        els.modal.style.display = 'block';
        if (els.filenameInput) {
          els.filenameInput.focus();
          els.filenameInput.select();
        }
      }
    }

    function confirmSave() {
      var filename = (els.filenameInput.value.trim() || 'duzenlenmis_veri') + '.csv';

      var csvContent = headers.join(',') + '\n';
      csvContent += dataRows.map(function(row) {
        return headers.map(function(h) {
          var val = (row[h] || '').toString();
          if (val.includes(',') || val.includes('"') || val.includes('\n')) {
            return '"' + val.replace(/"/g, '""') + '"';
          }
          return val;
        }).join(',');
      }).join('\n');

      fetch('/save_data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: filename, data: csvContent })
      })
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (result.success) {
          showToast(translations[currentLang].saveSuccess, 'success');
          els.modal.style.display = 'none';
        } else {
          showToast(translations[currentLang].saveError + (result.message || ''), 'error');
        }
      })
      .catch(function(err) {
        showToast(translations[currentLang].saveError + err.message, 'error');
      });
    }

    function closeModal() {
      if (els.modal) els.modal.style.display = 'none';
    }

    function initEventListeners() {
      if (els.uploadBtn) {
        els.uploadBtn.addEventListener('click', function() { els.csvInput.click(); });
      }
      if (els.csvInput) {
        els.csvInput.addEventListener('change', handleFileUpload);
      }

      if (els.saveBtn) els.saveBtn.addEventListener('click', saveFile);
      if (els.undoBtn) els.undoBtn.addEventListener('click', undo);
      if (els.redoBtn) els.redoBtn.addEventListener('click', redo);
      if (els.addRowBtn) els.addRowBtn.addEventListener('click', addRow);
      if (els.addRowBtn2) els.addRowBtn2.addEventListener('click', addRow);
      if (els.clearBtn) els.clearBtn.addEventListener('click', clearAll);

      if (els.modalClose) els.modalClose.addEventListener('click', closeModal);
      if (els.modalCancel) els.modalCancel.addEventListener('click', closeModal);
      if (els.modal) {
        els.modal.addEventListener('click', function(e) {
          if (e.target === this) closeModal();
        });
      }
      if (els.confirmSaveBtn) els.confirmSaveBtn.addEventListener('click', confirmSave);

      if (els.themeToggle) {
        els.themeToggle.addEventListener('click', function() { setTheme(!dark); });
      }

      if (els.langSwitch) {
        els.langSwitch.addEventListener('click', function() {
          setLanguage(currentLang === 'tr' ? 'en' : 'tr');
          this.classList.add('animate');
          setTimeout(function() { this.classList.remove('animate'); }.bind(this), 200);
        });
      }

      if (els.logo) {
        els.logo.addEventListener('click', function() { window.location.href = '/'; });
      }

      document.addEventListener('keydown', function(e) {
        if (e.target.closest('td[contenteditable="true"]')) {
          if (e.key === 'Escape') {
            e.target.blur();
            return;
          }
        }

        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
          e.preventDefault();
          if (!els.undoBtn.disabled) undo();
        }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) {
          e.preventDefault();
          if (!els.redoBtn.disabled) redo();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          if (!els.saveBtn.disabled) saveFile();
        }
        if (e.key === 'Escape') {
          closeModal();
        }
      });

      window.addEventListener('beforeunload', function(e) {
        if (undoStack.length > 0 && dataRows.length > 0) {
          e.preventDefault();
          e.returnValue = '';
        }
      });
    }

    function init() {
      setTheme(dark);
      setLanguage('tr');
      updateClock();
      setInterval(updateClock, 1000);
      renderTable();
      initEventListeners();
    }

    document.addEventListener('DOMContentLoaded', init);

  })();
</script>
</body>
</html>
