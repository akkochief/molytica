<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Molytica</title>
  <link rel="icon" href="{{ url_for('static', filename='assets/favicon.ico') }}" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f6f7f9;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-header: rgba(255, 255, 255, 0.88);
      --text-primary: #0a0a0a;
      --text-secondary: #4a4a4a;
      --text-muted: #7a7a7a;
      --border-color: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.18);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.06);
      --btn-bg: #ffffff;
      --btn-text: #0a0a0a;
      --btn-hover: #0a0a0a;
      --btn-hover-text: #ffffff;
      --footer-bg: #0a0a0a;
      --footer-text: #d0d0d0;
      --clock-bg: #eef0f2;
      --clock-text: #3a3a3a;
      --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    [data-theme="dark"] {
      --bg-primary: #0d0d0d;
      --bg-secondary: #161616;
      --bg-card: #1a1a1a;
      --bg-header: rgba(20, 20, 20, 0.92);
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #707070;
      --border-color: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.14);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.5);
      --btn-bg: #222222;
      --btn-text: #f0f0f0;
      --btn-hover: #f0f0f0;
      --btn-hover-text: #0a0a0a;
      --footer-bg: #0a0a0a;
      --footer-text: #888888;
      --clock-bg: #282828;
      --clock-text: #c0c0c0;
    }

    body {
      background: var(--bg-primary);
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      background: var(--bg-header);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      height: 38px;
      cursor: pointer;
      transition: transform 0.3s ease;
      filter: brightness(0);
    }
    [data-theme="dark"] .logo {
      filter: brightness(0) invert(1);
    }
    .logo:hover {
      transform: scale(1.05) rotate(-1deg);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      transition: color var(--transition);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #clock {
      font-size: 0.85rem;
      font-weight: 450;
      color: var(--clock-text);
      background: var(--clock-bg);
      padding: 4px 14px;
      border-radius: 100px;
      letter-spacing: 0.4px;
      font-variant-numeric: tabular-nums;
      transition: all var(--transition);
    }

    .theme-toggle {
      background: var(--clock-bg);
      border: none;
      border-radius: 100px;
      padding: 6px 12px;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text-primary);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .theme-toggle:hover {
      transform: scale(0.95);
    }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--border-hover);
      border-radius: 100px;
      padding: 5px 14px;
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .lang-btn:hover {
      background: var(--text-primary);
      color: var(--bg-primary);
      transform: scale(0.95);
    }

    main {
      max-width: 1060px;
      margin: 52px auto;
      padding: 0 24px;
      flex: 1;
      width: 100%;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.7s ease forwards;
    }
    .hero h2 {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 8px;
      transition: color var(--transition);
    }
    .hero .subtitle {
      font-size: 1.05rem;
      color: var(--text-secondary);
      font-weight: 400;
      transition: color var(--transition);
    }

    .container {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.7s ease 0.15s forwards;
      opacity: 0;
    }

    .box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 28px 24px;
      flex: 1 1 340px;
      max-width: 430px;
      transition: all var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .box:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border-hover);
    }

    .box h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 22px;
      text-align: center;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      transition: color var(--transition);
      position: relative;
    }
    .box h3::after {
      content: '';
      display: block;
      width: 32px;
      height: 2px;
      background: var(--text-primary);
      margin: 8px auto 0;
      transition: width 0.3s ease;
    }
    .box:hover h3::after {
      width: 48px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px 0;
      margin-bottom: 10px;
      border: 1px solid var(--border-color);
      border-radius: 100px;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-weight: 500;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
      letter-spacing: 0.15px;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--btn-hover);
      transform: translateX(-100%);
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: -1;
    }
    .btn:hover {
      color: var(--btn-hover-text);
      border-color: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }
    .btn:hover::before {
      transform: translateX(0);
    }
    .btn:active {
      transform: translateY(0) scale(0.97);
    }
    .btn:last-child {
      margin-bottom: 0;
    }

    footer {
      background: var(--footer-bg);
      color: var(--footer-text);
      padding: 32px 24px 24px;
      margin-top: 40px;
      border-top: 1px solid var(--border-color);
      transition: background var(--transition), border-color var(--transition);
    }
    .footer-content {
      max-width: 1060px;
      margin: 0 auto;
      text-align: center;
    }
    .footer-content .contact {
      font-size: 0.9rem;
      margin-bottom: 14px;
      opacity: 0.7;
      letter-spacing: 0.2px;
    }
    .footer-content .contact strong {
      opacity: 1;
      color: #fff;
      font-weight: 500;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin: 16px 0 18px;
    }
    .social-icons a {
      color: #888;
      font-size: 1.3rem;
      transition: all 0.3s ease;
      opacity: 0.5;
    }
    .social-icons a:hover {
      color: #fff;
      transform: translateY(-2px);
      opacity: 1;
    }
    .copyright {
      font-size: 0.8rem;
      opacity: 0.35;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 768px) {
      header { padding: 12px 20px; }
      .logo { height: 30px; }
      header h1 { font-size: 1rem; }
      #clock { display: none; }
      .theme-toggle { padding: 4px 10px; font-size: 0.85rem; }
      .lang-btn { padding: 4px 10px; font-size: 0.65rem; }
      .hero h2 { font-size: 2rem; }
      .hero .subtitle { font-size: 0.9rem; }
      main { margin: 28px auto; padding: 0 16px; }
      .container { gap: 14px; }
      .box { padding: 20px 16px; flex: 1 1 100%; max-width: 100%; border-radius: 16px; }
      .box h3 { font-size: 1.05rem; margin-bottom: 16px; }
      .btn { padding: 10px 0; font-size: 0.82rem; margin-bottom: 8px; }
      footer { padding: 24px 16px 18px; }
      .social-icons { gap: 20px; }
      .social-icons a { font-size: 1.1rem; }
    }

    @media (max-width: 480px) {
      header h1 { font-size: 0.85rem; }
      .hero h2 { font-size: 1.5rem; }
      .btn { padding: 9px 0; font-size: 0.78rem; }
      .box { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="Molytica" class="logo" id="logo" />
    <h1 id="title">Molytica</h1>
  </div>
  <div class="header-right">
    <div id="clock"></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <i class="fas fa-moon" id="themeIcon"></i>
    </button>
    <button class="lang-btn" id="langSwitch">TR</button>
  </div>
</header>

<main>
  <section class="hero">
    <h2 id="mainTitle">Ne yapmak istersiniz?</h2>
    <p class="subtitle" id="subtitle">Veri yükleyin, analiz edin ve raporlar oluşturun</p>
  </section>

  <div class="container">
    <section class="box">
      <h3 id="section1Title">Veri Yükleme</h3>
      <button class="btn" id="dataset">Veri Setini Uygun Hale Getir</button>
      <button class="btn" id="manuel">Manuel Veri Girişi</button>
      <button class="btn" id="csv">CSV Dosyası Yükle</button>
      <button class="btn" id="excel">Excel'den CSV'ye Dönüştür</button>
    </section>

    <section class="box">
      <h3 id="section2Title">Veri Analizi</h3>
      <button class="btn" id="predictMl">Katalizör, Verim Tahmini</button>
      <button class="btn" id="tahmin">Tahmin Yap</button>
      <button class="btn" id="gorsellestirme">Görselleştirme</button>
      <button class="btn" id="rapor">Model Karşılaştırması</button>
      <button class="btn" id="yardim">Yardım</button>
    </section>
  </div>
</main>

  <footer>
    <div class="footer-content">
      <div class="contact">
        <strong id="contactLabel">İletişim</strong>
        <span id="contactInfo">akkochief@gmail.com · @akkochief</span>
      </div>
      <div class="social-icons">
        <a href="https://x.com/akkochief" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="https://github.com/akkocchief" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/akkochief/" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <div class="copyright" id="copyright">© 2026 Molytica</div>
    </div>
  </footer>

<script>
  (function() {
    'use strict';

    function updateClock() {
      var el = document.getElementById('clock');
      if (!el) return;
      el.textContent = new Date().toLocaleTimeString('tr-TR', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }
    updateClock();
    setInterval(updateClock, 1000);

    var translations = {
      tr: {
        title: 'Molytica',
        mainTitle: 'Ne yapmak istersiniz?',
        subtitle: 'Veri yükleyin, analiz edin ve raporlar oluşturun',
        section1Title: 'Veri Yükleme',
        manuel: 'Manuel Veri Girişi',
        csv: 'CSV Dosyası Yükle',
        excel: "Excel'den CSV'ye Dönüştür",
        section2Title: 'Veri Analizi',
        predictMl: 'Katalizör, Verim Tahmini',
        tahmin: 'Tahmin Yap',
        gorsellestirme: 'Görselleştirme',
        rapor: 'Model Karşılaştırması',
        yardim: 'Yardım',
        contact: 'İletişim',
        contactInfo: 'akkochief@gmail.com · @akkochief',
        copyright: '© 2026 Molytica',
        dataset: 'Veri Setini Uygun Hale Getir'
      },
      en: {
        title: 'Molytica',
        mainTitle: 'What would you like to do?',
        subtitle: 'Upload data, analyze and generate reports',
        section1Title: 'Data Upload',
        manuel: 'Manual Data Entry',
        csv: 'Upload CSV File',
        excel: 'Convert Excel to CSV',
        section2Title: 'Data Analysis',
        predictMl: 'Catalyst, Yield Prediction',
        tahmin: 'Make Prediction',
        gorsellestirme: 'Visualization',
        rapor: 'Model Comparison',
        yardim: 'Help',
        contact: 'Contact',
        contactInfo: 'akkochief@gmail.com · @akkochief',
        copyright: '© 2026 Molytica',
        dataset: 'Preprocess the Dataset'
      }
    };

    var currentLang = 'tr';

    function setLanguage(lang) {
      currentLang = lang;
      var t = translations[lang];

      var map = {
        '#title': 'title',
        '#mainTitle': 'mainTitle',
        '#subtitle': 'subtitle',
        '#section1Title': 'section1Title',
        '#manuel': 'manuel',
        '#csv': 'csv',
        '#excel': 'excel',
        '#section2Title': 'section2Title',
        '#predictMl': 'predictMl',
        '#tahmin': 'tahmin',
        '#gorsellestirme': 'gorsellestirme',
        '#rapor': 'rapor',
        '#yardim': 'yardim',
        '#contactLabel': 'contact',
        '#contactInfo': 'contactInfo',
        '#copyright': 'copyright',
        '#dataset': 'dataset'
      };

      Object.keys(map).forEach(function(selector) {
        var el = document.querySelector(selector);
        var key = map[selector];
        if (el && t[key] !== undefined) {
          el.textContent = t[key];
        }
      });

      var langBtn = document.getElementById('langSwitch');
      if (langBtn) {
        langBtn.textContent = lang.toUpperCase();
      }
    }

    var langSwitch = document.getElementById('langSwitch');
    if (langSwitch) {
      langSwitch.addEventListener('click', function() {
        setLanguage(currentLang === 'tr' ? 'en' : 'tr');
      });
    }

    var dark = localStorage.getItem('molytica-theme') === 'dark';

    function setTheme(d) {
      dark = d;
      document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
      localStorage.setItem('molytica-theme', d ? 'dark' : 'light');
      var icon = document.getElementById('themeIcon');
      if (icon) {
        icon.className = d ? 'fas fa-sun' : 'fas fa-moon';
      }
    }

    var themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
      themeToggle.addEventListener('click', function() {
        setTheme(!dark);
      });
    }

    var routes = {
      '#dataset': '/dataset',
      '#manuel': '/manual',
      '#csv': '/upload-csv',
      '#excel': '/excel_to_csv',
      '#predictMl': '/predict_ml',
      '#tahmin': '/predict',
      '#gorsellestirme': '/visual',
      '#rapor': '/compare-models',
      '#yardim': '/help'
    };

    Object.keys(routes).forEach(function(id) {
      var el = document.querySelector(id);
      var url = routes[id];
      if (el) {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          window.location.href = url;
        });
      }
    });

    var logo = document.getElementById('logo');
    if (logo) {
      logo.addEventListener('click', function() {
        window.location.href = '/';
      });
    }

    setLanguage('tr');
    setTheme(dark);

  })();
</script>
</body>
</html>
