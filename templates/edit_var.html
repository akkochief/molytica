<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Molytica - XML Düzenleyici</title>
  <link rel="icon" href="{{ url_for('static', filename='assets/favicon.ico') }}" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f6f7f9;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-header: rgba(255, 255, 255, 0.88);
      --bg-input: #f1f3f5;
      --bg-editor: #fafbfc;
      --text-primary: #0a0a0a;
      --text-secondary: #4a4a4a;
      --text-muted: #7a7a7a;
      --border-color: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.18);
      --border-focus: rgba(0, 0, 0, 0.3);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.06);
      --btn-bg: #ffffff;
      --btn-text: #0a0a0a;
      --btn-hover: #0a0a0a;
      --btn-hover-text: #ffffff;
      --footer-bg: #0a0a0a;
      --footer-text: #d0d0d0;
      --clock-bg: #eef0f2;
      --clock-text: #3a3a3a;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --radius-xl: 100px;
      --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --font: 'Inter', -apple-system, system-ui, sans-serif;
      --editor-font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    [data-theme="dark"] {
      --bg-primary: #0d0d0d;
      --bg-secondary: #161616;
      --bg-card: #1a1a1a;
      --bg-header: rgba(20, 20, 20, 0.92);
      --bg-input: #282828;
      --bg-editor: #1a1a1a;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #707070;
      --border-color: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.14);
      --border-focus: rgba(255, 255, 255, 0.25);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.5);
      --btn-bg: #222222;
      --btn-text: #f0f0f0;
      --btn-hover: #f0f0f0;
      --btn-hover-text: #0a0a0a;
      --footer-bg: #0a0a0a;
      --footer-text: #888888;
      --clock-bg: #282828;
      --clock-text: #c0c0c0;
    }

    body {
      background: var(--bg-primary);
      font-family: var(--font);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    header {
      background: var(--bg-header);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      height: 38px;
      cursor: pointer;
      transition: transform 0.3s ease;
      filter: brightness(0);
    }
    [data-theme="dark"] .logo {
      filter: brightness(0) invert(1);
    }
    .logo:hover {
      transform: scale(1.05) rotate(-1deg);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      transition: color var(--transition);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #clock {
      font-size: 0.85rem;
      font-weight: 450;
      color: var(--clock-text);
      background: var(--clock-bg);
      padding: 4px 14px;
      border-radius: var(--radius-xl);
      letter-spacing: 0.4px;
      font-variant-numeric: tabular-nums;
      transition: all var(--transition);
    }

    .theme-toggle {
      background: var(--clock-bg);
      border: none;
      border-radius: var(--radius-xl);
      padding: 6px 12px;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text-primary);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .theme-toggle:hover {
      transform: scale(0.95);
    }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--border-hover);
      border-radius: var(--radius-xl);
      padding: 5px 14px;
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .lang-btn:hover {
      background: var(--text-primary);
      color: var(--bg-primary);
      transform: scale(0.95);
    }
    .lang-btn.animate {
      transform: scale(0.92);
      transition: transform 0.15s ease;
    }

    main {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
      flex: 1;
      width: 100%;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      animation: fadeUp 0.7s ease forwards;
    }
    .page-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      transition: color var(--transition);
    }
    .page-header .file-info {
      font-size: 0.9rem;
      color: var(--text-muted);
      background: var(--bg-input);
      padding: 4px 16px;
      border-radius: var(--radius-xl);
      transition: all var(--transition);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
      animation: fadeUp 0.7s ease 0.1s forwards;
      opacity: 0;
    }

    .btn {
      padding: 10px 24px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: var(--font);
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-sm);
    }
    .btn:hover:not(:disabled) {
      background: var(--btn-hover);
      color: var(--btn-hover-text);
      border-color: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .btn:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-primary {
      background: var(--text-primary);
      color: var(--bg-primary);
      border-color: var(--text-primary);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--text-secondary);
      border-color: var(--text-secondary);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border-hover);
    }

    .editor-section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
      animation: fadeUp 0.7s ease 0.2s forwards;
      opacity: 0;
    }
    .editor-section:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-md);
    }

    .editor-section .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .editor-section .section-header h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      transition: color var(--transition);
    }
    .editor-section .section-header .line-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--bg-input);
      padding: 2px 12px;
      border-radius: var(--radius-xl);
      transition: all var(--transition);
    }

    .xml-editor {
      width: 100%;
      min-height: 450px;
      font-family: var(--editor-font);
      font-size: 0.85rem;
      line-height: 1.7;
      padding: 16px 20px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: var(--bg-editor);
      color: var(--text-primary);
      white-space: pre;
      overflow-x: auto;
      outline: none;
      transition: all var(--transition);
      tab-size: 2;
      -moz-tab-size: 2;
    }
    .xml-editor:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.04);
    }
    [data-theme="dark"] .xml-editor:focus {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
    }

    .message {
      padding: 12px 20px;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }
    .message.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
    }
    .message.success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }
    [data-theme="dark"] .message.error {
      background: #3a1a1a;
      border-color: #ef5350;
      color: #ef9a9a;
    }
    [data-theme="dark"] .message.success {
      background: #1a3a1a;
      border-color: #4caf50;
      color: #a5d6a7;
    }

    .message .icon {
      font-size: 1.2rem;
    }

    footer {
      background: var(--footer-bg);
      color: var(--footer-text);
      padding: 32px 24px 24px;
      margin-top: 40px;
      border-top: 1px solid var(--border-color);
      transition: background var(--transition), border-color var(--transition);
    }
    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }
    .footer-content .contact {
      font-size: 0.9rem;
      margin-bottom: 14px;
      opacity: 0.7;
      letter-spacing: 0.2px;
    }
    .footer-content .contact strong {
      opacity: 1;
      color: #fff;
      font-weight: 500;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin: 16px 0 18px;
    }
    .social-icons a {
      color: #888;
      font-size: 1.3rem;
      transition: all 0.3s ease;
      opacity: 0.5;
    }
    .social-icons a:hover {
      color: #fff;
      transform: translateY(-2px);
      opacity: 1;
    }
    .copyright {
      font-size: 0.8rem;
      opacity: 0.35;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 768px) {
      header { padding: 12px 20px; }
      .logo { height: 30px; }
      header h1 { font-size: 1rem; }
      #clock { display: none; }
      .theme-toggle { padding: 4px 10px; font-size: 0.85rem; }
      .lang-btn { padding: 4px 10px; font-size: 0.65rem; }
      main { margin: 20px auto; padding: 0 16px; }
      .page-header h2 { font-size: 1.2rem; }
      .page-header .file-info { font-size: 0.8rem; }
      .toolbar { gap: 8px; }
      .btn { padding: 8px 16px; font-size: 0.8rem; }
      .editor-section { padding: 16px; border-radius: var(--radius-md); }
      .xml-editor { min-height: 300px; font-size: 0.8rem; padding: 12px 16px; }
      footer { padding: 24px 16px; }
      .social-icons a { font-size: 1.1rem; gap: 20px; }
    }

    @media (max-width: 480px) {
      header h1 { font-size: 0.85rem; }
      .lang-btn { font-size: 0.6rem; padding: 3px 8px; }
      .page-header { flex-direction: column; align-items: flex-start; }
      .btn { padding: 6px 14px; font-size: 0.75rem; }
      .editor-section { padding: 12px; }
      .xml-editor { min-height: 250px; font-size: 0.75rem; padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="Molytica" class="logo" id="logo">
      <h1 id="headerTitle">Edit</h1>
    </div>
    <div class="header-right">
      <div id="clock"></div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>
      <button class="lang-btn" id="langSwitch">TR</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h2 id="pageTitle">XML Veri Düzenleyici</h2>
      <span class="file-info" id="fileInfo">info.xml</span>
    </div>

    <div id="messageContainer"></div>

    <div class="toolbar">
      <button class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> <span>Kaydet</span></button>
      <button class="btn btn-outline" id="formatBtn"><i class="fas fa-code"></i> <span>Biçimlendir</span></button>
      <button class="btn btn-outline" id="resetBtn"><i class="fas fa-undo-alt"></i> <span>Geri Yükle</span></button>
      <button class="btn btn-outline" id="validateBtn"><i class="fas fa-check-circle"></i> <span>Doğrula</span></button>
    </div>

    <section class="editor-section">
      <div class="section-header">
        <h3 id="editorTitle">Düzenlenen Veri</h3>
        <span class="line-info" id="lineInfo">Satir: 1</span>
      </div>
      <div class="xml-editor" id="xmlEditor" contenteditable="true" spellcheck="false"></div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <div class="contact">
        <strong id="contactLabel">İletişim</strong>
        <span id="contactInfo">akkochief@gmail.com · @akkochief</span>
      </div>
      <div class="social-icons">
        <a href="https://x.com/akkochief" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="https://github.com/akkocchief" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/akkochief/" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <div class="copyright" id="copyright">© 2026 Molytica</div>
    </div>
  </footer>

  <script>
    (function() {
      'use strict';

      var currentLang = 'tr';
      var dark = localStorage.getItem('molytica-theme') === 'dark';
      var originalXml = '';
      var currentXml = '';

      var $ = function(id) { return document.getElementById(id); };

      var els = {
        logo: $('logo'),
        langSwitch: $('langSwitch'),
        themeToggle: $('themeToggle'),
        themeIcon: $('themeIcon'),
        clock: $('clock'),
        xmlEditor: $('xmlEditor'),
        saveBtn: $('saveBtn'),
        formatBtn: $('formatBtn'),
        resetBtn: $('resetBtn'),
        validateBtn: $('validateBtn'),
        msgContainer: $('messageContainer'),
        lineInfo: $('lineInfo'),
        headerTitle: $('headerTitle'),
        pageTitle: $('pageTitle'),
        editorTitle: $('editorTitle'),
        fileInfo: $('fileInfo'),
        contactLabel: $('contactLabel'),
        contactInfo: $('contactInfo'),
        copyright: $('copyright')
      };

      var translations = {
        tr: {
          headerTitle: 'Düzenle',
          pageTitle: 'XML Veri Düzenleyici',
          editorTitle: 'Düzenlenen Veri',
          fileInfo: 'info.xml',
          save: 'Kaydet',
          format: 'Biçimlendir',
          reset: 'Geri Yükle',
          validate: 'Doğrula',
          contact: 'Iletisim',
          contactInfo: 'akkochief@gmail.com · @akkochief',
          copyright: '© 2026 Molytica',
          saveSuccess: 'XML basariyla kaydedildi: info.xml',
          saveError: 'Hata: ',
          resetConfirm: 'Degisiklikleri geri almak istediginize emin misiniz?',
          loadingError: 'XML dosyasi yüklenemedi',
          validateSuccess: 'XML gecerli.',
          validateError: 'XML gecersiz: '
        },
        en: {
          headerTitle: 'Edit',
          pageTitle: 'XML Data Editor',
          editorTitle: 'Edited Data',
          fileInfo: 'info.xml',
          save: 'Save',
          format: 'Format',
          reset: 'Reset',
          validate: 'Validate',
          contact: 'Contact',
          contactInfo: 'akkochief@gmail.com · @akkochief',
          copyright: '© 2026 Molytica',
          saveSuccess: 'XML successfully saved: info.xml',
          saveError: 'Error: ',
          resetConfirm: 'Are you sure you want to discard changes?',
          loadingError: 'Failed to load XML file',
          validateSuccess: 'XML is valid.',
          validateError: 'XML is invalid: '
        }
      };

      function t(key) {
        return translations[currentLang]?.[key] || key;
      }

      function setTheme(d) {
        dark = d;
        document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
        localStorage.setItem('molytica-theme', d ? 'dark' : 'light');
        if (els.themeIcon) {
          els.themeIcon.className = d ? 'fas fa-sun' : 'fas fa-moon';
        }
      }

      function setLanguage(lang) {
        currentLang = lang;
        var t = translations[lang];
        if (!t) return;

        var map = {
          headerTitle: 'headerTitle',
          pageTitle: 'pageTitle',
          editorTitle: 'editorTitle',
          fileInfo: 'fileInfo',
          contactLabel: 'contact',
          contactInfo: 'contactInfo',
          copyright: 'copyright'
        };

        Object.keys(map).forEach(function(id) {
          var el = els[id];
          if (el) el.textContent = t[map[id]];
        });

        var saveSpan = els.saveBtn?.querySelector('span');
        var formatSpan = els.formatBtn?.querySelector('span');
        var resetSpan = els.resetBtn?.querySelector('span');
        var validateSpan = els.validateBtn?.querySelector('span');

        if (saveSpan) saveSpan.textContent = t.save;
        if (formatSpan) formatSpan.textContent = t.format;
        if (resetSpan) resetSpan.textContent = t.reset;
        if (validateSpan) validateSpan.textContent = t.validate;

        if (els.langSwitch) {
          els.langSwitch.textContent = lang.toUpperCase();
        }

        var lineText = els.lineInfo?.textContent || '';
        if (lineText.includes('Satir') || lineText.includes('Line')) {
          var lineNum = lineText.replace(/[^0-9]/g, '');
          var prefix = lang === 'tr' ? 'Satir: ' : 'Line: ';
          if (els.lineInfo && lineNum) {
            els.lineInfo.textContent = prefix + lineNum;
          }
        }
      }

      function updateClock() {
        if (!els.clock) return;
        els.clock.textContent = new Date().toLocaleTimeString(
          currentLang === 'tr' ? 'tr-TR' : 'en-US', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
          }
        );
      }

      function showMessage(message, type) {
        type = type || 'error';
        var icon = type === 'error' ? '!' : type === 'success' ? '+' : 'i';
        var iconMap = {
          'error': '!',
          'success': '+',
          'info': 'i'
        };
        var iconChar = iconMap[type] || 'i';

        els.msgContainer.innerHTML = '<div class="message ' + type + '"><span class="icon">' + iconChar + '</span><span>' + message + '</span></div>';
        setTimeout(function() { els.msgContainer.innerHTML = ''; }, 5000);
      }

      function updateLineInfo() {
        if (!els.xmlEditor || !els.lineInfo) return;
        var lines = els.xmlEditor.textContent.split('\n').length;
        var prefix = currentLang === 'tr' ? 'Satir: ' : 'Line: ';
        els.lineInfo.textContent = prefix + lines;
      }

      function formatXML(xml) {
        var formatted = '';
        var indent = 0;
        var tab = '  ';

        xml = xml.replace(/>\s*</g, '><').trim();

        var parts = xml.split(/(<[^>]+>)/g).filter(function(p) { return p.trim(); });

        for (var i = 0; i < parts.length; i++) {
          var part = parts[i];
          if (part.match(/^<\/[^>]+>/)) {
            indent--;
            formatted += tab.repeat(indent) + part + '\n';
          } else if (part.match(/^<[^>]+\/>/)) {
            formatted += tab.repeat(indent) + part + '\n';
          } else if (part.match(/^<[^>]+>/)) {
            formatted += tab.repeat(indent) + part + '\n';
            indent++;
          } else {
            var text = part.trim();
            if (text) {
              formatted += tab.repeat(indent) + text + '\n';
            }
          }
        }

        return formatted.trim();
      }

      function validateXML(xml) {
        try {
          var parser = new DOMParser();
          var xmlDoc = parser.parseFromString(xml, 'text/xml');
          var errors = xmlDoc.getElementsByTagName('parsererror');
          if (errors.length > 0) {
            return { valid: false, error: errors[0].textContent };
          }
          return { valid: true };
        } catch (e) {
          return { valid: false, error: e.message };
        }
      }

      function loadXML() {
        var t = translations[currentLang];
        fetch("{{ url_for('static', filename='xml_data/info.xml') }}")
          .then(function(response) {
            if (!response.ok) throw new Error(t.loadingError);
            return response.text();
          })
          .then(function(content) {
            originalXml = content;
            var formatted = formatXML(content);
            currentXml = formatted;
            els.xmlEditor.textContent = formatted;
            updateLineInfo();
          })
          .catch(function(error) {
            showMessage(t.loadingError + ': ' + error.message, 'error');

            var fallback = '<?xml version="1.0" encoding="UTF-8"?>\n<suzuki_config>\n  <chemical_intuition>\n    <temperature>\n      <optimal_temp>85</optimal_temp>\n      <temp_range>35</temp_range>\n      <min_temp>40</min_temp>\n      <max_temp>150</max_temp>\n    </temperature>\n  </chemical_intuition>\n</suzuki_config>';
            originalXml = fallback;
            currentXml = fallback;
            els.xmlEditor.textContent = fallback;
            updateLineInfo();
          });
      }

      function saveXML() {
        var t = translations[currentLang];
        var content = els.xmlEditor.textContent;

        var validation = validateXML(content);
        if (!validation.valid) {
          showMessage(t.validateError + validation.error, 'error');
          return;
        }

        fetch("{{ url_for('save_xml') }}", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ xml: content })
        })
        .then(function(response) {
          if (!response.ok) throw new Error('Sunucu hatasi');
          return response.json();
        })
        .then(function(result) {
          if (result.success) {
            showMessage(t.saveSuccess, 'success');
            originalXml = content;
            currentXml = content;
          } else {
            throw new Error(result.message || 'Kayit basarisiz');
          }
        })
        .catch(function(error) {
          showMessage(t.saveError + error.message, 'error');
        });
      }

      function resetXML() {
        var t = translations[currentLang];
        if (!confirm(t.resetConfirm)) return;
        var formatted = formatXML(originalXml);
        currentXml = formatted;
        els.xmlEditor.textContent = formatted;
        updateLineInfo();
        showMessage('Degisiklikler geri alindi.', 'success');
      }

      function handleFormat() {
        var formatted = formatXML(els.xmlEditor.textContent);
        els.xmlEditor.textContent = formatted;
        updateLineInfo();
        showMessage('XML bicimlendirildi.', 'success');
      }

      function handleValidate() {
        var t = translations[currentLang];
        var content = els.xmlEditor.textContent;
        var result = validateXML(content);

        if (result.valid) {
          showMessage(t.validateSuccess, 'success');
        } else {
          showMessage(t.validateError + result.error, 'error');
        }
      }

      if (els.logo) {
        els.logo.addEventListener('click', function() { window.location.href = '/'; });
      }

      if (els.langSwitch) {
        els.langSwitch.addEventListener('click', function() {
          setLanguage(currentLang === 'tr' ? 'en' : 'tr');
          this.classList.add('animate');
          setTimeout(function() { this.classList.remove('animate'); }.bind(this), 200);
        });
      }

      if (els.themeToggle) {
        els.themeToggle.addEventListener('click', function() { setTheme(!dark); });
      }

      if (els.saveBtn) els.saveBtn.addEventListener('click', saveXML);
      if (els.formatBtn) els.formatBtn.addEventListener('click', handleFormat);
      if (els.resetBtn) els.resetBtn.addEventListener('click', resetXML);
      if (els.validateBtn) els.validateBtn.addEventListener('click', handleValidate);

      if (els.xmlEditor) {
        els.xmlEditor.addEventListener('input', updateLineInfo);
        els.xmlEditor.addEventListener('keydown', function(e) {
          if (e.key === 'Tab') {
            e.preventDefault();
            document.execCommand('insertText', false, '  ');
          }
        });
      }

      document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          if (document.activeElement === els.xmlEditor) {
            e.preventDefault();
            if (!els.saveBtn.disabled) saveXML();
          }
        }
      });

      setTheme(dark);
      setLanguage('tr');
      updateClock();
      setInterval(updateClock, 1000);
      loadXML();

    })();
  </script>
</body>
</html>
